<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificación facial</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #2b002b;
    color: white;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
}

/* HEADER */
.header {
    padding: 15px;
}

.back {
    font-size: 26px;
    cursor: pointer;
}

/* MENSAJE */
.message {
    background: #ff6b6b;
    color: #2b002b;
    padding: 12px;
    border-radius: 12px;
    margin: 10px 20px;
    text-align: center;
    font-weight: 600;
}

/* CONTENEDOR */
.camera-container {
    position: relative;
    flex: 1;
}

/* VIDEO FULLSCREEN */
video {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* 🔥 MÁSCARA OSCURA CON HUECO */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(43, 0, 43, 0.85);

    /* AGUJERO EN FORMA DE ÓVALO */
    mask-image: radial-gradient(ellipse 130px 190px at center, transparent 98%, black 100%);
    -webkit-mask-image: radial-gradient(ellipse 130px 190px at center, transparent 98%, black 100%);
}

/* BORDE DEL ÓVALO */
.oval-border {
    position: absolute;
    width: 260px;
    height: 380px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.6);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

/* TEXTO */
.footer-text {
    text-align: center;
    padding: 20px;
    color: #ccc;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="header">
    <span class="back" onclick="history.back()">←</span>
</div>

<div class="message">
    Mira de frente a la cámara por favor
</div>

<div class="camera-container">
    <video id="video" autoplay playsinline></video>
    <div class="overlay"></div>
    <div class="oval-border"></div>
</div>

<div class="footer-text">
    Mantén tu rostro dentro del óvalo
</div>

<script>
const video = document.getElementById("video");

navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
    video.srcObject = stream;
})
.catch(() => {
    video.style.display = "none";
});
</script>

</body>
</html>
