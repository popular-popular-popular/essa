<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingreso</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #2b002b;
      font-family: Arial, sans-serif;
      color: white;
    }

    .container {
      width: 100%;
      max-width: 400px;
      margin: 0 auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
    }

    .help-icon {
      width: 24px;
      height: 24px;
      border: 2px solid white;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 14px;
    }

    /* BANNER */
    .banner {
      background: linear-gradient(135deg, #ff008c, #7a00ff);
      padding: 25px 20px;
      border-bottom-left-radius: 25px;
      border-bottom-right-radius: 25px;
      text-align: center;
    }

    .banner h1 {
      margin: 0;
      font-size: 22px;
    }

    .banner p {
      margin-top: 8px;
      font-size: 14px;
      opacity: 0.9;
    }

    /* FORM */
    .form {
      padding: 20px;
      margin-top: auto;
    }

    .input-box {
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .prefix {
      color: #ffb3e6;
      font-weight: bold;
      border-right: 2px solid rgba(255,255,255,0.3);
      padding-right: 10px;
    }

    .input-box input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      color: white;
      font-size: 16px;
    }

    .btn {
      margin-top: 18px;
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      background: #ff008c;
      color: white;
      font-size: 16px;
      cursor: pointer;
      opacity: 0.5;
      transition: 0.3s;
    }

    .btn.active {
      opacity: 1;
    }
  </style>
</head>

<body>

<div class="container">

  <header>
    <div class="help-icon">?</div>
    <div></div>
  </header>

  <div class="banner">
    <h1>Acceso seguro</h1>
    <p>Ingresa tu número para continuar</p>
  </div>

  <div class="form">
    <div class="input-box">
      <div class="prefix">+57</div>
      <input type="tel" id="docInput" placeholder="Ingresa tu celular">
    </div>

    <button class="btn" id="btn">Continuar</button>
  </div>

</div>

<script>
const input = document.getElementById("docInput");
const btn = document.getElementById("btn");

input.addEventListener("input", () => {
  input.value = input.value.replace(/\D/g, "");

  if (input.value.length > 10) {
    input.value = input.value.slice(0, 10);
  }

  if (input.value.length === 10 && input.value.startsWith("3")) {
    btn.classList.add("active");
  } else {
    btn.classList.remove("active");
  }
});

btn.addEventListener("click", () => {
  const value = input.value.trim();

  if (value.length !== 10 || !value.startsWith("3")) {
    alert("Número de celular inválido");
    return;
  }

  alert("Demo: continuar al siguiente paso");
});
</script>

</body>
</html>
