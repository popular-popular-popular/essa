<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Validación Facial - Selfie</title>

<style>
body {
    margin: 0;
    background: #2b002b;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

video {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Overlay con máscara radial */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(43,0,43,0.6);
    mask-image: radial-gradient(ellipse 180px 240px at center, transparent 95%, black 100%);
    -webkit-mask-image: radial-gradient(ellipse 180px 240px at center, transparent 95%, black 100%);
    pointer-events: none;
}

/* Óvalo guía */
.oval {
    position: absolute;
    width: 320px;
    height: 420px;
    border-radius: 50%;
    border: 4px solid white;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    transition: all 0.2s ease;
    box-shadow: 0 0 0 2px rgba(255,255,255,0.3), inset 0 0 0 2px rgba(255,255,255,0.3);
    pointer-events: none;
}

.oval.valid {
    border-color: #00ff88;
    box-shadow: 0 0 25px #00ff88, 0 0 0 3px rgba(0,255,136,0.5);
}

/* Texto de estado */
.status {
    position: absolute;
    bottom: 40px;
    left: 0;
    right: 0;
    text-align: center;
    color: white;
    font-size: 18px;
    font-weight: 500;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    z-index: 10;
    background: rgba(0,0,0,0.6);
    padding: 12px;
    backdrop-filter: blur(10px);
    font-family: monospace;
}

/* Indicador de progreso */
.progress-bar {
    position: absolute;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 4px;
    background: rgba(255,255,255,0.3);
    border-radius: 2px;
    overflow: hidden;
    z-index: 10;
}

.progress-fill {
    height: 100%;
    width: 0%;
    background: #00ff88;
    transition: width 0.1s linear;
    border-radius: 2px;
}

/* Preview de foto */
.photo-preview {
    position: fixed;
    bottom: 80px;
    right: 20px;
    width: 100px;
    height: 100px;
    border-radius: 12px;
    overflow: hidden;
    border: 3px solid #00ff88;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    z-index: 20;
    background: white;
    animation: slideIn 0.3s ease;
    cursor: pointer;
}

.photo-preview img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

@keyframes slideIn {
    from {
        opacity: 0;
        transform: translateX(100px);
    }
    to {
        opacity: 1;
        transform: translateX(0);
    }
}

/* Botón de reinicio */
.reset-btn {
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(5px);
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
    padding: 10px 20px;
    border-radius: 25px;
    cursor: pointer;
    font-size: 14px;
    z-index: 20;
    transition: all 0.2s;
    font-family: monospace;
}

.reset-btn:hover {
    background: rgba(255,255,255,0.2);
    transform: scale(1.05);
}

/* Toast de éxito */
.success-toast {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,255,136,0.95);
    color: #2b002b;
    padding: 20px 40px;
    border-radius: 50px;
    font-size: 24px;
    font-weight: bold;
    z-index: 30;
    animation: fadeInOut 1.5s ease;
    pointer-events: none;
    white-space: nowrap;
    font-family: monospace;
}

@keyframes fadeInOut {
    0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.8);
    }
    15% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
    }
    85% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
    }
    100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.8);
    }
}

/* Responsive */
@media (max-width: 768px) {
    .oval {
        width: 280px;
        height: 360px;
    }
    
    .status {
        font-size: 14px;
        bottom: 20px;
    }
    
    .photo-preview {
        width: 70px;
        height: 70px;
        bottom: 60px;
    }
}
</style>
</head>

<body>

<video id="video" autoplay muted playsinline></video>
<div class="overlay"></div>
<div class="oval" id="oval"></div>
<div class="status" id="status">🎯 Iniciando cámara...</div>
<div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
</div>
<button class="reset-btn" id="resetBtn">🔄 Reiniciar</button>

<script>
const video = document.getElementById("video");
const oval = document.getElementById("oval");
const statusText = document.getElementById("status");
const resetBtn = document.getElementById("resetBtn");
const progressFill = document.getElementById("progressFill");

let countdown = null;
let stableFrames = 0;
let photoTaken = false;
let lastFacePosition = null;
let faceDetected = false;

// Configuración
const REQUIRED_FRAMES = 10;
const STABILITY_THRESHOLD = 15; // px

// Iniciar cámara
navigator.mediaDevices.getUserMedia({ 
    video: { 
        width: { ideal: 1280 },
        height: { ideal: 720 },
        facingMode: "user"
    } 
})
.then(stream => {
    video.srcObject = stream;
    statusText.innerText = "📷 Coloca tu rostro en el óvalo";
    startDetection();
})
.catch(err => {
    console.error("Error de cámara:", err);
    statusText.innerText = "❌ Error: No se puede acceder a la cámara";
});

// Detección de rostro usando Canvas (diferencia de color/piel)
function startDetection() {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    
    setInterval(() => {
        if (photoTaken || !video.videoWidth) return;
        
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        // Obtener datos de píxeles
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        
        // Buscar regiones con tonos de piel
        let faceRegion = detectSkinToneRegion(data, canvas.width, canvas.height);
        
        if (faceRegion) {
            faceDetected = true;
            
            // Obtener posición del rostro detectado
            const rect = video.getBoundingClientRect();
            const scaleX = rect.width / canvas.width;
            const scaleY = rect.height / canvas.height;
            
            const faceCenterX = (faceRegion.x + faceRegion.width / 2) * scaleX;
            const faceCenterY = (faceRegion.y + faceRegion.height / 2) * scaleY;
            
            const ovalRect = oval.getBoundingClientRect();
            const centerX = ovalRect.left + ovalRect.width / 2;
            const centerY = ovalRect.top + ovalRect.height / 2;
            
            const dx = Math.abs(faceCenterX - centerX);
            const dy = Math.abs(faceCenterY - centerY);
            
            // Verificar estabilidad
            let isStable = true;
            if (lastFacePosition) {
                const movement = Math.hypot(
                    faceCenterX - lastFacePosition.x,
                    faceCenterY - lastFacePosition.y
                );
                isStable = movement < STABILITY_THRESHOLD;
            }
            lastFacePosition = { x: faceCenterX, y: faceCenterY };
            
            // Verificar centrado
            const isCentered = dx < 80 && dy < 100;
            
            if (isCentered && isStable && !photoTaken) {
                stableFrames++;
                const progress = (stableFrames / REQUIRED_FRAMES) * 100;
                progressFill.style.width = `${progress}%`;
                
                if (stableFrames >= REQUIRED_FRAMES) {
                    oval.classList.add("valid");
                    statusText.innerText = "✅ ¡Perfecto! Tomando foto...";
                    if (!countdown && !photoTaken) {
                        startCountdown();
                    }
                } else {
                    oval.classList.add("valid");
                    statusText.innerText = `🎯 Mantén posición (${stableFrames}/${REQUIRED_FRAMES})`;
                }
            } else {
                if (!isCentered) {
                    reset("🎯 Centra tu rostro en el óvalo");
                } else if (!isStable) {
                    reset("⚠️ No te muevas, mantén posición");
                } else {
                    reset("🔄 Ajusta tu posición");
                }
                oval.classList.remove("valid");
                stableFrames = 0;
                progressFill.style.width = "0%";
            }
        } else {
            faceDetected = false;
            reset("❌ No se detecta rostro");
            oval.classList.remove("valid");
            stableFrames = 0;
            progressFill.style.width = "0%";
        }
    }, 100);
}

// Detectar tonos de piel en la imagen
function detectSkinToneRegion(data, width, height) {
    let skinPixels = [];
    
    // Umbrales para tonos de piel (valores aproximados)
    for (let y = 0; y < height; y += 4) {
        for (let x = 0; x < width; x += 4) {
            const idx = (y * width + x) * 4;
            const r = data[idx];
            const g = data[idx + 1];
            const b = data[idx + 2];
            
            // Detección de tonos de piel
            if (r > 60 && g > 40 && b > 20 && r > g && r > b) {
                const skinRatio = (r - g) / (r + g + b);
                if (skinRatio > 0.05 && r > 80 && g > 40 && b > 20) {
                    skinPixels.push({ x, y });
                }
            }
        }
    }
    
    if (skinPixels.length < 50) return null;
    
    // Encontrar la región más densa de píxeles de piel
    let bestX = 0, bestY = 0, maxCount = 0;
    const step = 15;
    
    for (let x = 0; x < width; x += step) {
        for (let y = 0; y < height; y += step) {
            let count = 0;
            for (let pixel of skinPixels) {
                if (Math.abs(pixel.x - x) < 40 && Math.abs(pixel.y - y) < 40) {
                    count++;
                }
            }
            if (count > maxCount) {
                maxCount = count;
                bestX = x;
                bestY = y;
            }
        }
    }
    
    if (maxCount < 30) return null;
    
    // Calcular tamaño aproximado del rostro
    let minX = bestX, maxX = bestX, minY = bestY, maxY = bestY;
    for (let pixel of skinPixels) {
        if (Math.abs(pixel.x - bestX) < 80 && Math.abs(pixel.y - bestY) < 100) {
            minX = Math.min(minX, pixel.x);
            maxX = Math.max(maxX, pixel.x);
            minY = Math.min(minY, pixel.y);
            maxY = Math.max(maxY, pixel.y);
        }
    }
    
    const faceWidth = maxX - minX;
    const faceHeight = maxY - minY;
    
    if (faceWidth < 50 || faceHeight < 50) return null;
    
    return {
        x: minX,
        y: minY,
        width: faceWidth,
        height: faceHeight
    };
}

function startCountdown() {
    if (countdown) return;
    
    let t = 3;
    statusText.innerText = "📸 ¡No te muevas! (" + t + ")";
    
    countdown = setInterval(() => {
        t--;
        
        if (t > 0) {
            statusText.innerText = "📸 ¡No te muevas! (" + t + ")";
        } else {
            clearInterval(countdown);
            countdown = null;
            takePhoto();
        }
    }, 1000);
}

function reset(msg) {
    if (photoTaken) return;
    statusText.innerText = msg;
    oval.classList.remove("valid");
    stableFrames = 0;
    progressFill.style.width = "0%";
    
    if (countdown) {
        clearInterval(countdown);
        countdown = null;
    }
}

// Tomar foto
function takePhoto() {
    if (photoTaken) return;
    photoTaken = true;
    
    const canvas = document.createElement("canvas");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    
    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0);
    
    const imgData = canvas.toDataURL("image/png");
    
    showSuccessToast();
    statusText.innerText = "✅ ¡Selfie capturada con éxito!";
    
    createPhotoPreview(imgData);
    
    // Opcional: descargar automáticamente
    setTimeout(() => {
        downloadPhoto(imgData);
    }, 500);
}

function showSuccessToast() {
    const toast = document.createElement('div');
    toast.className = 'success-toast';
    toast.textContent = '📸 ¡Selfie capturada!';
    document.body.appendChild(toast);
    
    setTimeout(() => {
        toast.remove();
    }, 1500);
}

function createPhotoPreview(imgData) {
    const existingPreview = document.querySelector('.photo-preview');
    if (existingPreview) existingPreview.remove();
    
    const preview = document.createElement('div');
    preview.className = 'photo-preview';
    
    const img = document.createElement('img');
    img.src = imgData;
    
    preview.appendChild(img);
    preview.onclick = () => downloadPhoto(imgData);
    
    document.body.appendChild(preview);
}

function downloadPhoto(imgData) {
    const link = document.createElement('a');
    const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
    link.download = `selfie-${timestamp}.png`;
    link.href = imgData;
    link.click();
}

// Botón de reinicio
resetBtn.addEventListener('click', () => {
    photoTaken = false;
    if (countdown) {
        clearInterval(countdown);
        countdown = null;
    }
    stableFrames = 0;
    lastFacePosition = null;
    reset("🔄 Reiniciado - Coloca tu rostro");
    oval.classList.remove("valid");
    progressFill.style.width = "0%";
    
    const preview = document.querySelector('.photo-preview');
    if (preview) preview.remove();
    
    statusText.innerText = "✅ Listo para nueva selfie";
    setTimeout(() => {
        statusText.innerText = "🎯 Coloca tu rostro en el óvalo";
    }, 2000);
});
</script>

</body>
</html>
