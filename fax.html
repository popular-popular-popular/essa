<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

<style>
body {
    margin: 0;
    background: #2b002b;
    overflow: hidden;
}

/* VIDEO */
video {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* OVERLAY */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(43,0,43,0.5);

    mask-image: radial-gradient(ellipse 150px 210px at center, transparent 98%, black 100%);
    -webkit-mask-image: radial-gradient(ellipse 150px 210px at center, transparent 98%, black 100%);
}

/* ÓVALO */
.oval {
    position: absolute;
    width: 300px;
    height: 420px;
    border-radius: 50%;
    border: 4px solid white;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    transition: 0.2s;
}

.valid {
    border-color: #00ff88;
    box-shadow: 0 0 25px #00ff88;
}

/* TEXTO */
.status {
    position: absolute;
    bottom: 30px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 18px;
}
</style>
</head>

<body>

<video id="video" autoplay muted playsinline></video>
<div class="overlay"></div>
<div class="oval" id="oval"></div>
<div class="status" id="status">Iniciando...</div>

<script>
const video = document.getElementById("video");
const oval = document.getElementById("oval");
const statusText = document.getElementById("status");

let countdown = null;
let stableFrames = 0;

// Cámara
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => video.srcObject = stream);

// Cargar modelo
Promise.all([
    faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/npm/face-api.js/models')
]).then(start);

function start() {
    statusText.innerText = "Mira al frente";

    setInterval(async () => {

        const result = await faceapi.detectSingleFace(
            video,
            new faceapi.TinyFaceDetectorOptions()
        );

        if (!result) {
            reset("❌ No hay rostro");
            return;
        }

        // 🔥 ESCALADO CORRECTO
        const rect = video.getBoundingClientRect();

        const scaleX = rect.width / video.videoWidth;
        const scaleY = rect.height / video.videoHeight;

        const box = result.box;

        const faceX = (box.x + box.width / 2) * scaleX;
        const faceY = (box.y + box.height / 2) * scaleY;

        // Centro del óvalo
        const ovalRect = oval.getBoundingClientRect();
        const ovalCenterX = ovalRect.left + ovalRect.width / 2;
        const ovalCenterY = ovalRect.top + ovalRect.height / 2;

        const dx = Math.abs(faceX - ovalCenterX);
        const dy = Math.abs(faceY - ovalCenterY);

        // 🔥 VALIDACIÓN REAL
        const inside = dx < 90 && dy < 130;

        if (inside) {
            oval.classList.add("valid");
            stableFrames++;

            if (stableFrames > 5) {
                startCountdown();
            }

        } else {
            reset("⚠️ Centra tu rostro");
        }

    }, 200);
}

function startCountdown() {
    if (countdown) return;

    let t = 3;
    statusText.innerText = "📸 No te muevas (" + t + ")";

    countdown = setInterval(() => {
        t--;

        if (t > 0) {
            statusText.innerText = "📸 No te muevas (" + t + ")";
        } else {
            clearInterval(countdown);
            countdown = null;
            takePhoto();
        }
    }, 1000);
}

function reset(msg) {
    statusText.innerText = msg;
    oval.classList.remove("valid");
    stableFrames = 0;

    if (countdown) {
        clearInterval(countdown);
        countdown = null;
    }
}

// 📸 FOTO
function takePhoto() {
    const canvas = document.createElement("canvas");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0);

    const img = canvas.toDataURL("image/png");

    statusText.innerText = "✅ Foto tomada";

    const preview = document.createElement("img");
    preview.src = img;
    preview.style.position = "absolute";
    preview.style.width = "120px";
    preview.style.bottom = "80px";
    preview.style.right = "20px";

    document.body.appendChild(preview);
}
</script>

</body>
</html>
