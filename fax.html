<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificación facial</title>

<script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

<style>
body {
    margin: 0;
    background: #2b002b;
    font-family: sans-serif;
    color: white;
}

.message {
    background: #ff6b6b;
    color: #2b002b;
    padding: 12px;
    border-radius: 12px;
    margin: 15px;
    text-align: center;
    font-weight: bold;
}

video {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Overlay transparente */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(43,0,43,0.55);

    mask-image: radial-gradient(ellipse 140px 200px at center, transparent 98%, black 100%);
    -webkit-mask-image: radial-gradient(ellipse 140px 200px at center, transparent 98%, black 100%);
}

/* Óvalo */
.oval-border {
    position: absolute;
    width: 280px;
    height: 400px;
    border-radius: 50%;
    border: 4px solid white;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    transition: 0.3s;
}

/* Verde cuando valida */
.oval-border.valid {
    border-color: #00ff88;
    box-shadow: 0 0 20px #00ff88;
}

/* Texto estado */
.status {
    position: absolute;
    bottom: 20px;
    width: 100%;
    text-align: center;
    font-size: 18px;
}
</style>
</head>

<body>

<div class="message" id="msg">Cargando cámara...</div>

<video id="video" autoplay muted playsinline></video>
<div class="overlay"></div>
<div class="oval-border" id="oval"></div>

<div class="status" id="status">🔍 Detectando rostro...</div>

<script>
const video = document.getElementById("video");
const statusText = document.getElementById("status");
const msg = document.getElementById("msg");
const oval = document.getElementById("oval");

let countdown = null;

// Cámara
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
    video.srcObject = stream;
});

// Cargar modelo
Promise.all([
    faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/npm/face-api.js/models')
]).then(startDetection);

function startDetection() {
    msg.innerText = "Mira de frente a la cámara";

    setInterval(async () => {
        const detection = await faceapi.detectSingleFace(
            video,
            new faceapi.TinyFaceDetectorOptions()
        );

        if (!detection) {
            resetState("❌ No hay rostro");
            return;
        }

        const { x, y, width, height } = detection.box;

        const faceCenterX = x + width / 2;
        const faceCenterY = y + height / 2;

        const screenCenterX = video.videoWidth / 2;
        const screenCenterY = video.videoHeight / 2;

        const dx = Math.abs(faceCenterX - screenCenterX);
        const dy = Math.abs(faceCenterY - screenCenterY);

        if (dx < 80 && dy < 120) {
            // ✅ ROSTRO CORRECTO
            oval.classList.add("valid");

            if (!countdown) {
                startCountdown();
            }

        } else {
            resetState("⚠️ Centra tu rostro");
        }

    }, 300);
}

function startCountdown() {
    let time = 3;
    statusText.innerText = "📸 No te muevas (" + time + ")";

    countdown = setInterval(() => {
        time--;

        if (time > 0) {
            statusText.innerText = "📸 No te muevas (" + time + ")";
        } else {
            clearInterval(countdown);
            countdown = null;
            takePhoto();
        }
    }, 1000);
}

function resetState(text) {
    statusText.innerText = text;
    oval.classList.remove("valid");

    if (countdown) {
        clearInterval(countdown);
        countdown = null;
    }
}

// 📸 CAPTURA
function takePhoto() {
    const canvas = document.createElement("canvas");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0);

    const image = canvas.toDataURL("image/png");

    statusText.innerText = "✅ Foto tomada";

    // Mostrar imagen (demo)
    const img = document.createElement("img");
    img.src = image;
    img.style.position = "absolute";
    img.style.width = "120px";
    img.style.bottom = "60px";
    img.style.right = "20px";
    document.body.appendChild(img);

    console.log(image); // aquí puedes enviar al servidor
}
</script>

</body>
</html>
