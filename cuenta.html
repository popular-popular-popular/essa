<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estado de Cuenta</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #2b002b;
      font-family: Arial, sans-serif;
      color: white;
    }

    .container {
      width: 100%;
      max-width: 400px;
      margin: 0 auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .help-icon {
      width: 24px;
      height: 24px;
      border: 2px solid white;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 14px;
    }

    .banner {
      background: linear-gradient(135deg, #ff008c, #7a00ff);
      padding: 25px 20px;
      border-bottom-left-radius: 25px;
      border-bottom-right-radius: 25px;
    }

    .banner h1 {
      margin: 0;
      font-size: 20px;
    }

    .content {
      padding: 20px;
      margin-top: auto;
    }

    .card {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 15px;
      text-align: center;
    }

    .card p {
      font-size: 14px;
      opacity: 0.9;
    }

    .btn {
      margin-top: 20px;
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      background: #ff008c;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="container">

  <header>
    <div class="help-icon">?</div>
    <div></div>
  </header>

  <div class="banner">
    <h1>Cuenta restringida</h1>
  </div>

  <div class="content">
    <div class="card">
      <p>
        Tu cuenta presenta una restricción temporal por actividad inusual.
        Para continuar, debes completar un proceso de verificación.
      </p>

      <!-- 🔽 Mensaje agregado (clave dinámica de Nequi) 🔽 -->
      <p style="background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; margin-top: 15px;">
        ⚠️ Tu clave dinámica de Nequi ha sido temporalmente desactivada por seguridad.<br>
        Para reactivar tu clave dinámica, haz el proceso de verificación.
      </p>

      <button class="btn" onclick="continuar()">Iniciar verificación</button>
    </div>
  </div>

</div>

<script>
function continuar(){
  alert("Demo: flujo de verificación");
}
</script>

</body>
</html>
