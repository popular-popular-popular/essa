<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verificación de Cuenta</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .card {
      background: #1e293b;
      padding: 30px;
      border-radius: 16px;
      width: 320px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      text-align: center;
    }
    .title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .subtitle {
      font-size: 14px;
      color: #cbd5f5;
      margin-bottom: 20px;
    }
    .warning {
      background: #facc15;
      color: #000;
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 20px;
    }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }
    button:hover {
      background: #16a34a;
    }
    .footer {
      margin-top: 15px;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">Cuenta restringida</div>
    <div class="subtitle">Por seguridad, tu acceso ha sido limitado temporalmente.</div>

    <div class="warning">
      Detectamos actividad inusual. Necesitamos verificar tu identidad para restablecer el acceso.
    </div>

    <button onclick="verificar()">Verificar identidad</button>

    <div class="footer">Este es un prototipo educativo. No ingreses datos reales.</div>
  </div>

  <script>
    function verificar() {
      alert("Simulación de verificación biométrica completada.");
    }
  </script>
</body>
</html>
